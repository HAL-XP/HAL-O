<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claudeborn — Floating Tiles</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #030308;
    color: #c8d6e5;
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    width: 100vw; height: 100vh; overflow: hidden;
    position: relative;
  }

  .vignette {
    position: fixed; inset: 0; z-index: 100; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  }

  .grid-floor {
    position: fixed; bottom: 0; left: 0; right: 0; height: 35vh; z-index: 0;
    background:
      linear-gradient(to top, rgba(132,204,22,0.06) 1px, transparent 1px),
      linear-gradient(to right, rgba(132,204,22,0.06) 1px, transparent 1px);
    background-size: 60px 40px;
    transform: perspective(500px) rotateX(55deg);
    transform-origin: bottom center;
    mask-image: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
  }

  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    height: 48px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    background: linear-gradient(to bottom, rgba(3,3,8,0.95), transparent);
    border-bottom: 1px solid rgba(132,204,22,0.15);
  }
  .top-bar .sys-label { font-size: 13px; font-weight: 600; color: #84cc16; letter-spacing: 2px; }
  .top-bar .stats { display: flex; gap: 24px; font-size: 11px; letter-spacing: 1px; }
  .top-bar .stats span { color: #556; }
  .top-bar .stats .val { color: #84cc16; }

  .edge-readout {
    position: fixed; z-index: 50; font-size: 9px; color: rgba(132,204,22,0.35);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .edge-readout.left { left: 10px; top: 50%; transform: rotate(-90deg) translateX(-50%); transform-origin: left center; }
  .edge-readout.right { right: 10px; top: 50%; transform: rotate(90deg) translateX(50%); transform-origin: right center; }
  .edge-readout.bottom-left { left: 20px; bottom: 12px; }
  .edge-readout.bottom-right { right: 20px; bottom: 12px; }

  .hal-eye-container {
    position: fixed; z-index: 30;
    left: 50%; top: 50%; transform: translate(-50%, -50%);
  }
  .hal-eye {
    width: 110px; height: 110px; border-radius: 50%;
    background: radial-gradient(circle, #ff1a1a 0%, #cc0000 30%, #660000 60%, #330000 80%, transparent 100%);
    box-shadow: 0 0 60px rgba(255,0,0,0.4), 0 0 120px rgba(255,0,0,0.15), inset 0 0 30px rgba(255,100,100,0.3);
    position: relative;
    animation: halPulse 4s ease-in-out infinite;
  }
  .hal-eye::after {
    content: ''; position: absolute; inset: 20%; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,100,100,0.3) 40%, transparent 70%);
  }
  @keyframes halPulse {
    0%, 100% { box-shadow: 0 0 60px rgba(255,0,0,0.4), 0 0 120px rgba(255,0,0,0.15); }
    50% { box-shadow: 0 0 80px rgba(255,0,0,0.5), 0 0 160px rgba(255,0,0,0.2); }
  }

  .connections-svg {
    position: fixed; inset: 0; z-index: 5; pointer-events: none;
  }

  /* Square tile */
  .tile {
    position: absolute; z-index: 10;
    width: 110px; height: 90px;
    background: rgba(132,204,22,0.04);
    border: 1px solid rgba(132,204,22,0.15);
    border-radius: 3px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.3s ease;
    transform: translate(-50%, -50%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 8px;
    cursor: pointer;
  }
  .tile:hover {
    background: rgba(132,204,22,0.1);
    border-color: rgba(132,204,22,0.4);
    box-shadow: 0 0 20px rgba(132,204,22,0.15);
    transform: translate(-50%, -50%) scale(1.05);
  }
  .tile::before {
    content: ''; position: absolute; top: -1px; left: -1px;
    width: 10px; height: 10px;
    border-top: 2px solid #84cc16; border-left: 2px solid #84cc16;
  }
  .tile::after {
    content: ''; position: absolute; bottom: -1px; right: -1px;
    width: 10px; height: 10px;
    border-bottom: 2px solid #84cc16; border-right: 2px solid #84cc16;
  }
  .tile-dot {
    width: 8px; height: 8px; border-radius: 50%; margin-bottom: 6px;
  }
  .tile-dot.ready { background: #84cc16; box-shadow: 0 0 8px rgba(132,204,22,0.6); }
  .tile-dot.pending { background: #eab308; box-shadow: 0 0 8px rgba(234,179,8,0.6); }
  .tile-name {
    font-size: 8px; font-weight: 600; color: #e2e8f0;
    letter-spacing: 1px; line-height: 1.3;
    word-break: break-all;
  }
  .tile-stack {
    font-size: 7px; color: rgba(132,204,22,0.5);
    letter-spacing: 0.5px; margin-top: 3px;
  }

  .bottom-bar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 50;
    display: flex; gap: 12px;
  }
  .cmd-btn {
    background: rgba(132,204,22,0.06);
    border: 1px solid rgba(132,204,22,0.25);
    color: #84cc16; padding: 8px 20px;
    font-family: inherit; font-size: 11px; letter-spacing: 2px;
    cursor: pointer; transition: all 0.3s;
    text-transform: uppercase;
  }
  .cmd-btn:hover {
    background: rgba(132,204,22,0.12);
    border-color: rgba(132,204,22,0.5);
    box-shadow: 0 0 15px rgba(132,204,22,0.15);
  }

  /* Subtle floating animation */
  @keyframes float {
    0%, 100% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-6px); }
  }
</style>
</head>
<body>

<div class="vignette"></div>
<div class="grid-floor"></div>

<div class="top-bar">
  <div class="sys-label">SYS://CLAUDEBORN</div>
  <div class="stats">
    <span><span class="val">14</span> OPS</span>
    <span><span class="val">10</span> READY</span>
    <span><span class="val">4</span> PENDING</span>
  </div>
</div>

<div class="edge-readout left">FLOATING TILES // GLASS WALL MODE</div>
<div class="edge-readout right">ORGANIC LAYOUT // SCATTER PATTERN</div>
<div class="edge-readout bottom-left">TILE GRID 0xF1A7 :: FREEFORM</div>
<div class="edge-readout bottom-right">UPLINK 2026.03.22 // SESSION ACTIVE</div>

<div class="hal-eye-container">
  <div class="hal-eye"></div>
</div>

<svg class="connections-svg" id="connectionsSvg"></svg>
<div id="tilesContainer"></div>

<div class="bottom-bar">
  <button class="cmd-btn">+ NEW OPERATION</button>
  <button class="cmd-btn">+ RECRUIT EXISTING</button>
</div>

<script>
const projects = [
  { name: 'CLAUDEBORN', stack: 'ELECTRON/REACT', status: 'ready' },
  { name: 'SNOWFINDER', stack: 'NEXT.JS', status: 'ready' },
  { name: 'PREZSANDRINE', stack: 'REACT/VITE', status: 'ready' },
  { name: 'INEVITABLESTUDIO', stack: 'UNITY/C#', status: 'pending' },
  { name: 'OFFLINEGAME', stack: 'GODOT', status: 'ready' },
  { name: 'COMMUNITYSCANNER', stack: 'PYTHON', status: 'ready' },
  { name: 'DNDMAPBUILDER', stack: 'REACT', status: 'pending' },
  { name: 'SCRIPT2UNREAL', stack: 'PYTHON/UE5', status: 'ready' },
  { name: 'PIXELAGENT\nMONITOR', stack: 'ELECTRON', status: 'ready' },
  { name: 'CLAUDEPRODUCT\nFINDER', stack: 'NEXT.JS/AI', status: 'pending' },
  { name: 'CINEMASTER\nDEMO', stack: 'REACT/THREE', status: 'ready' },
  { name: 'PIXEL-AGENTS', stack: 'PYTHON/ML', status: 'ready' },
  { name: 'MODEL\nTRAINING', stack: 'PYTORCH', status: 'pending' },
  { name: 'CLAUDE\nDOWNLOAD', stack: 'NODE.JS', status: 'ready' },
];

// Pre-calculated organic positions (as % of viewport)
// Arranged to avoid center eye and provide pleasing scatter
const positions = [
  { x: 15, y: 20 },
  { x: 32, y: 14 },
  { x: 72, y: 12 },
  { x: 88, y: 20 },
  { x: 8,  y: 42 },
  { x: 25, y: 50 },
  { x: 78, y: 45 },
  { x: 92, y: 55 },
  { x: 12, y: 68 },
  { x: 35, y: 72 },
  { x: 55, y: 76 },
  { x: 75, y: 72 },
  { x: 90, y: 78 },
  { x: 55, y: 18 },
];

const container = document.getElementById('tilesContainer');
const svg = document.getElementById('connectionsSvg');
const cx = window.innerWidth / 2;
const cy = window.innerHeight / 2;

projects.forEach((p, i) => {
  const pos = positions[i];
  const x = pos.x * window.innerWidth / 100;
  const y = pos.y * window.innerHeight / 100;

  // Connection line
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', cx); line.setAttribute('y1', cy);
  line.setAttribute('x2', x); line.setAttribute('y2', y);
  line.setAttribute('stroke', 'rgba(132,204,22,0.06)');
  line.setAttribute('stroke-width', '1');
  line.setAttribute('stroke-dasharray', '2,6');
  svg.appendChild(line);

  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.style.left = x + 'px';
  tile.style.top = y + 'px';
  tile.style.animation = `float ${3 + (i % 4) * 0.7}s ease-in-out ${i * 0.3}s infinite`;
  tile.innerHTML = `
    <div class="tile-dot ${p.status}"></div>
    <div class="tile-name">${p.name}</div>
    <div class="tile-stack">${p.stack}</div>
  `;
  container.appendChild(tile);
});
</script>
</body>
</html>
