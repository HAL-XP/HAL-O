<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAL-O — Neural Network</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #030308;
    color: #c8d6e5;
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    width: 100vw; height: 100vh; overflow: hidden;
    position: relative;
  }

  .vignette {
    position: fixed; inset: 0; z-index: 100; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  }

  .grid-floor {
    position: fixed; bottom: 0; left: 0; right: 0; height: 35vh; z-index: 0;
    background:
      linear-gradient(to top, rgba(132,204,22,0.06) 1px, transparent 1px),
      linear-gradient(to right, rgba(132,204,22,0.06) 1px, transparent 1px);
    background-size: 60px 40px;
    transform: perspective(500px) rotateX(55deg);
    transform-origin: bottom center;
    mask-image: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
  }

  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    height: 48px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    background: linear-gradient(to bottom, rgba(3,3,8,0.95), transparent);
    border-bottom: 1px solid rgba(132,204,22,0.15);
  }
  .top-bar .sys-label { font-size: 13px; font-weight: 600; color: #84cc16; letter-spacing: 2px; }
  .top-bar .stats { display: flex; gap: 24px; font-size: 11px; letter-spacing: 1px; }
  .top-bar .stats span { color: #556; }
  .top-bar .stats .val { color: #84cc16; }

  .edge-readout {
    position: fixed; z-index: 50; font-size: 9px; color: rgba(132,204,22,0.35);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .edge-readout.left { left: 10px; top: 50%; transform: rotate(-90deg) translateX(-50%); transform-origin: left center; }
  .edge-readout.right { right: 10px; top: 50%; transform: rotate(90deg) translateX(50%); transform-origin: right center; }
  .edge-readout.bottom-left { left: 20px; bottom: 12px; }
  .edge-readout.bottom-right { right: 20px; bottom: 12px; }

  .connections-svg {
    position: fixed; inset: 0; z-index: 5; pointer-events: none;
  }

  /* Layer labels */
  .layer-label {
    position: fixed; z-index: 20; font-size: 8px; color: rgba(132,204,22,0.3);
    letter-spacing: 2px; top: 58px;
  }

  /* Neural network node cards */
  .nn-card {
    position: absolute; z-index: 10;
    width: 180px;
    background: rgba(132,204,22,0.04);
    border: 1px solid rgba(132,204,22,0.15);
    border-radius: 4px;
    padding: 10px 12px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.3s ease;
    transform: translate(-50%, -50%);
  }
  .nn-card:hover {
    background: rgba(132,204,22,0.08);
    border-color: rgba(132,204,22,0.4);
    box-shadow: 0 0 20px rgba(132,204,22,0.1);
  }
  .nn-card::before {
    content: ''; position: absolute; top: -1px; left: -1px;
    width: 14px; height: 14px;
    border-top: 2px solid #84cc16; border-left: 2px solid #84cc16;
  }
  .nn-card::after {
    content: ''; position: absolute; bottom: -1px; right: -1px;
    width: 14px; height: 14px;
    border-bottom: 2px solid #84cc16; border-right: 2px solid #84cc16;
  }
  .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.ready { background: #84cc16; box-shadow: 0 0 6px rgba(132,204,22,0.6); }
  .status-dot.pending { background: #eab308; box-shadow: 0 0 6px rgba(234,179,8,0.6); }
  .card-name { font-size: 10px; font-weight: 600; color: #e2e8f0; letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-stack { font-size: 8px; color: rgba(132,204,22,0.6); background: rgba(132,204,22,0.08); padding: 2px 6px; border-radius: 2px; display: inline-block; letter-spacing: 1px; }

  /* HAL eye as central processing node */
  .hal-node {
    position: absolute; z-index: 30;
    transform: translate(-50%, -50%);
  }
  .hal-eye {
    width: 100px; height: 100px; border-radius: 50%;
    background: radial-gradient(circle, #ff1a1a 0%, #cc0000 30%, #660000 60%, #330000 80%, transparent 100%);
    box-shadow: 0 0 60px rgba(255,0,0,0.4), 0 0 120px rgba(255,0,0,0.15), inset 0 0 30px rgba(255,100,100,0.3);
    position: relative;
    animation: halPulse 4s ease-in-out infinite;
  }
  .hal-eye::after {
    content: ''; position: absolute; inset: 20%; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,100,100,0.3) 40%, transparent 70%);
  }
  @keyframes halPulse {
    0%, 100% { box-shadow: 0 0 60px rgba(255,0,0,0.4), 0 0 120px rgba(255,0,0,0.15); }
    50% { box-shadow: 0 0 80px rgba(255,0,0,0.5), 0 0 160px rgba(255,0,0,0.2); }
  }
  .hal-label {
    text-align: center; margin-top: 8px;
    font-size: 8px; color: rgba(132,204,22,0.4); letter-spacing: 2px;
  }

  .bottom-bar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 50;
    display: flex; gap: 12px;
  }
  .cmd-btn {
    background: rgba(132,204,22,0.06);
    border: 1px solid rgba(132,204,22,0.25);
    color: #84cc16; padding: 8px 20px;
    font-family: inherit; font-size: 11px; letter-spacing: 2px;
    cursor: pointer; transition: all 0.3s;
    text-transform: uppercase;
  }
  .cmd-btn:hover {
    background: rgba(132,204,22,0.12);
    border-color: rgba(132,204,22,0.5);
    box-shadow: 0 0 15px rgba(132,204,22,0.15);
  }

  /* Data flow animation */
  @keyframes dataFlow {
    0% { stroke-dashoffset: 20; }
    100% { stroke-dashoffset: 0; }
  }
  .data-flow {
    animation: dataFlow 2s linear infinite;
  }
</style>
</head>
<body>

<div class="vignette"></div>
<div class="grid-floor"></div>

<div class="top-bar">
  <div class="sys-label">SYS://HAL-O</div>
  <div class="stats">
    <span><span class="val">14</span> OPS</span>
    <span><span class="val">10</span> READY</span>
    <span><span class="val">4</span> PENDING</span>
  </div>
</div>

<div class="edge-readout left">NEURAL TOPOLOGY // 5-LAYER NETWORK</div>
<div class="edge-readout right">SIGNAL PROPAGATION // FORWARD PASS</div>
<div class="edge-readout bottom-left">WEIGHTS 0xNN01 :: OPTIMIZED</div>
<div class="edge-readout bottom-right">UPLINK 2026.03.22 // SESSION ACTIVE</div>

<svg class="connections-svg" id="connectionsSvg"></svg>
<div id="networkContainer"></div>

<div class="bottom-bar">
  <button class="cmd-btn">+ NEW OPERATION</button>
  <button class="cmd-btn">+ RECRUIT EXISTING</button>
</div>

<script>
const projects = [
  { name: 'HAL-O', stack: 'ELECTRON/REACT', status: 'ready' },
  { name: 'SNOWFINDER', stack: 'NEXT.JS', status: 'ready' },
  { name: 'PREZSANDRINE', stack: 'REACT/VITE', status: 'ready' },
  { name: 'INEVITABLESTUDIO', stack: 'UNITY/C#', status: 'pending' },
  { name: 'OFFLINEGAME', stack: 'GODOT/GDSCRIPT', status: 'ready' },
  { name: 'COMMUNITYSCANNER', stack: 'PYTHON/FAST', status: 'ready' },
  { name: 'DNDMAPBUILDER', stack: 'REACT/CANVAS', status: 'pending' },
  { name: 'SCRIPT2UNREAL', stack: 'PYTHON/UE5', status: 'ready' },
  { name: 'PIXELAGENTMONITOR', stack: 'ELECTRON', status: 'ready' },
  { name: 'CLAUDEPRODUCTFINDER', stack: 'NEXT.JS/AI', status: 'pending' },
  { name: 'CINEMASTER-DEMO', stack: 'REACT/THREE', status: 'ready' },
  { name: 'PIXEL-AGENTS', stack: 'PYTHON/ML', status: 'ready' },
  { name: 'MODELTRAINING', stack: 'PYTHON/TORCH', status: 'pending' },
  { name: 'CLAUDEDOWNLOAD', stack: 'NODE.JS/CLI', status: 'ready' },
];

// Neural network layers: input(4) -> hidden1(4) -> HAL(1) -> hidden2(3) -> output(3)
// Layer x-positions as % of viewport width
const W = window.innerWidth;
const H = window.innerHeight;
const layerX = [0.08, 0.28, 0.50, 0.72, 0.92];

// Define which projects go in which layer
const layers = [
  // Input layer (4 nodes)
  [
    { idx: 0, yFrac: 0.20 },
    { idx: 1, yFrac: 0.40 },
    { idx: 2, yFrac: 0.60 },
    { idx: 3, yFrac: 0.80 },
  ],
  // Hidden layer 1 (4 nodes)
  [
    { idx: 4, yFrac: 0.18 },
    { idx: 5, yFrac: 0.38 },
    { idx: 6, yFrac: 0.58 },
    { idx: 7, yFrac: 0.78 },
  ],
  // Central HAL node (special)
  [
    { idx: -1, yFrac: 0.50 }, // HAL eye
  ],
  // Hidden layer 2 (3 nodes)
  [
    { idx: 8, yFrac: 0.25 },
    { idx: 9, yFrac: 0.50 },
    { idx: 10, yFrac: 0.75 },
  ],
  // Output layer (3 nodes)
  [
    { idx: 11, yFrac: 0.25 },
    { idx: 12, yFrac: 0.50 },
    { idx: 13, yFrac: 0.75 },
  ],
];

const container = document.getElementById('networkContainer');
const svg = document.getElementById('connectionsSvg');

// Store node positions for connection drawing
const nodePositions = [];

// Create layer labels
const layerNames = ['INPUT', 'HIDDEN-1', 'CORE', 'HIDDEN-2', 'OUTPUT'];
layerNames.forEach((name, li) => {
  const label = document.createElement('div');
  label.className = 'layer-label';
  label.style.left = (layerX[li] * W) + 'px';
  label.style.transform = 'translateX(-50%)';
  label.textContent = name;
  container.appendChild(label);
});

// Create nodes
layers.forEach((layer, li) => {
  const lx = layerX[li] * W;
  layer.forEach(node => {
    const ny = node.yFrac * H;
    const pos = { x: lx, y: ny, layer: li };
    nodePositions.push(pos);

    if (node.idx === -1) {
      // HAL eye node
      const halNode = document.createElement('div');
      halNode.className = 'hal-node';
      halNode.style.left = lx + 'px';
      halNode.style.top = ny + 'px';
      halNode.innerHTML = `
        <div class="hal-eye"></div>
        <div class="hal-label">CPU NODE</div>
      `;
      container.appendChild(halNode);
    } else {
      const p = projects[node.idx];
      const card = document.createElement('div');
      card.className = 'nn-card';
      card.style.left = lx + 'px';
      card.style.top = ny + 'px';
      card.innerHTML = `
        <div class="card-header">
          <div class="status-dot ${p.status}"></div>
          <div class="card-name">${p.name}</div>
        </div>
        <div class="card-stack">${p.stack}</div>
      `;
      container.appendChild(card);
    }
  });
});

// Draw connections between adjacent layers
// Connection patterns: each node in layer L connects to each node in layer L+1
// Stronger connections between related projects (thicker)
let posIdx = 0;
const layerNodePositions = [];
layers.forEach(layer => {
  const lnp = [];
  layer.forEach(() => {
    lnp.push(nodePositions[posIdx]);
    posIdx++;
  });
  layerNodePositions.push(lnp);
});

// Relatedness (for thicker lines): same language family
const relatedPairs = new Set([
  '0-4', '1-5', '2-6', '3-7',  // input to hidden1 (direct)
  '4-8', '5-9', '6-9', '7-10', // hidden1 to core neighbors
  '8-11', '9-12', '10-13',     // hidden2 to output
]);

for (let li = 0; li < layerNodePositions.length - 1; li++) {
  const currentLayer = layerNodePositions[li];
  const nextLayer = layerNodePositions[li + 1];

  currentLayer.forEach((fromNode, fi) => {
    nextLayer.forEach((toNode, ti) => {
      const globalFrom = layers.slice(0, li).reduce((s, l) => s + l.length, 0) + fi;
      const globalTo = layers.slice(0, li + 1).reduce((s, l) => s + l.length, 0) + ti;
      const pairKey = `${globalFrom}-${globalTo}`;
      const isRelated = relatedPairs.has(pairKey);

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', fromNode.x);
      line.setAttribute('y1', fromNode.y);
      line.setAttribute('x2', toNode.x);
      line.setAttribute('y2', toNode.y);
      line.setAttribute('stroke', isRelated ? 'rgba(132,204,22,0.15)' : 'rgba(132,204,22,0.05)');
      line.setAttribute('stroke-width', isRelated ? '2' : '1');
      line.setAttribute('stroke-dasharray', isRelated ? '6,4' : '3,8');
      if (isRelated) line.classList.add('data-flow');
      svg.appendChild(line);
    });
  });
}

// Add node dots at connection points
nodePositions.forEach(pos => {
  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('cx', pos.x);
  dot.setAttribute('cy', pos.y);
  dot.setAttribute('r', '3');
  dot.setAttribute('fill', '#84cc16');
  dot.setAttribute('opacity', '0.2');
  svg.appendChild(dot);
});
</script>
</body>
</html>
