<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claudeborn — Left Panel + Right Stage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #030308;
    color: #c8d6e5;
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    width: 100vw; height: 100vh; overflow: hidden;
    position: relative;
  }

  .vignette {
    position: fixed; inset: 0; z-index: 100; pointer-events: none;
    background: radial-gradient(ellipse at 65% 50%, transparent 40%, rgba(0,0,0,0.7) 100%);
  }

  .grid-floor {
    position: fixed; bottom: 0; left: 28%; right: 0; height: 35vh; z-index: 0;
    background:
      linear-gradient(to top, rgba(132,204,22,0.06) 1px, transparent 1px),
      linear-gradient(to right, rgba(132,204,22,0.06) 1px, transparent 1px);
    background-size: 60px 40px;
    transform: perspective(500px) rotateX(55deg);
    transform-origin: bottom center;
    mask-image: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
  }

  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    height: 48px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    background: linear-gradient(to bottom, rgba(3,3,8,0.95), transparent);
    border-bottom: 1px solid rgba(132,204,22,0.15);
  }
  .top-bar .sys-label { font-size: 13px; font-weight: 600; color: #84cc16; letter-spacing: 2px; }
  .top-bar .stats { display: flex; gap: 24px; font-size: 11px; letter-spacing: 1px; }
  .top-bar .stats span { color: #556; }
  .top-bar .stats .val { color: #84cc16; }

  .edge-readout {
    position: fixed; z-index: 50; font-size: 9px; color: rgba(132,204,22,0.35);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .edge-readout.right { right: 10px; top: 50%; transform: rotate(90deg) translateX(50%); transform-origin: right center; }
  .edge-readout.bottom-right { right: 20px; bottom: 12px; }

  /* Left panel */
  .left-panel {
    position: fixed; left: 0; top: 48px; bottom: 0; width: 28%;
    z-index: 20;
    background: rgba(3,3,8,0.9);
    border-right: 1px solid rgba(132,204,22,0.12);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(132,204,22,0.1);
    font-size: 10px; color: rgba(132,204,22,0.5);
    letter-spacing: 2px;
    flex-shrink: 0;
  }
  .panel-list {
    flex: 1; overflow-y: auto; padding: 10px;
    scrollbar-width: thin; scrollbar-color: rgba(132,204,22,0.15) transparent;
  }
  .panel-list::-webkit-scrollbar { width: 4px; }
  .panel-list::-webkit-scrollbar-track { background: transparent; }
  .panel-list::-webkit-scrollbar-thumb { background: rgba(132,204,22,0.2); border-radius: 2px; }

  .panel-card {
    width: 100%; padding: 12px 14px; margin-bottom: 6px;
    background: rgba(132,204,22,0.03);
    border: 1px solid rgba(132,204,22,0.1);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }
  .panel-card:hover, .panel-card.active {
    background: rgba(132,204,22,0.08);
    border-color: rgba(132,204,22,0.35);
  }
  .panel-card.active {
    box-shadow: 0 0 15px rgba(132,204,22,0.1);
  }
  .panel-card::before {
    content: ''; position: absolute; top: -1px; left: -1px;
    width: 10px; height: 10px;
    border-top: 2px solid #84cc16; border-left: 2px solid #84cc16;
  }
  .panel-card::after {
    content: ''; position: absolute; bottom: -1px; right: -1px;
    width: 10px; height: 10px;
    border-bottom: 2px solid #84cc16; border-right: 2px solid #84cc16;
  }
  .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.ready { background: #84cc16; box-shadow: 0 0 6px rgba(132,204,22,0.6); }
  .status-dot.pending { background: #eab308; box-shadow: 0 0 6px rgba(234,179,8,0.6); }
  .card-name { font-size: 10px; font-weight: 600; color: #e2e8f0; letter-spacing: 1px; }
  .card-stack { font-size: 8px; color: rgba(132,204,22,0.6); background: rgba(132,204,22,0.08); padding: 2px 6px; border-radius: 2px; display: inline-block; letter-spacing: 1px; }

  .panel-bottom {
    padding: 12px; border-top: 1px solid rgba(132,204,22,0.1);
    display: flex; flex-direction: column; gap: 6px;
    flex-shrink: 0;
  }

  /* Right stage */
  .right-stage {
    position: fixed; left: 28%; top: 48px; right: 0; bottom: 0;
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }

  .hal-eye {
    width: 120px; height: 120px; border-radius: 50%;
    background: radial-gradient(circle, #ff1a1a 0%, #cc0000 30%, #660000 60%, #330000 80%, transparent 100%);
    box-shadow: 0 0 60px rgba(255,0,0,0.4), 0 0 120px rgba(255,0,0,0.15), inset 0 0 30px rgba(255,100,100,0.3);
    position: relative;
    animation: halPulse 4s ease-in-out infinite;
  }
  .hal-eye::after {
    content: ''; position: absolute; inset: 20%; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,100,100,0.3) 40%, transparent 70%);
  }
  @keyframes halPulse {
    0%, 100% { box-shadow: 0 0 60px rgba(255,0,0,0.4), 0 0 120px rgba(255,0,0,0.15); }
    50% { box-shadow: 0 0 80px rgba(255,0,0,0.5), 0 0 160px rgba(255,0,0,0.2); }
  }

  /* HUD arcs on stage */
  .stage-hud {
    position: absolute; pointer-events: none;
  }
  .stage-hud svg { overflow: visible; }

  /* Stage detail panel (shown for selected card) */
  .stage-detail {
    position: absolute; z-index: 15;
    top: 50%; left: 50%; transform: translate(100px, -50%);
    width: 220px;
    background: rgba(132,204,22,0.04);
    border: 1px solid rgba(132,204,22,0.2);
    border-radius: 4px;
    padding: 16px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    opacity: 0.9;
  }
  .stage-detail::before {
    content: ''; position: absolute; top: -1px; left: -1px;
    width: 14px; height: 14px;
    border-top: 2px solid #84cc16; border-left: 2px solid #84cc16;
  }
  .stage-detail::after {
    content: ''; position: absolute; bottom: -1px; right: -1px;
    width: 14px; height: 14px;
    border-bottom: 2px solid #84cc16; border-right: 2px solid #84cc16;
  }
  .detail-name { font-size: 14px; font-weight: 700; color: #84cc16; letter-spacing: 2px; margin-bottom: 8px; }
  .detail-stack { font-size: 10px; color: rgba(132,204,22,0.6); margin-bottom: 12px; }
  .detail-row { font-size: 9px; color: #556; margin-bottom: 4px; letter-spacing: 1px; }
  .detail-row .val { color: #84cc16; }

  /* Connection from panel to stage */
  .connections-svg {
    position: fixed; inset: 0; z-index: 8; pointer-events: none;
  }

  .cmd-btn {
    background: rgba(132,204,22,0.06);
    border: 1px solid rgba(132,204,22,0.25);
    color: #84cc16; padding: 8px 16px;
    font-family: inherit; font-size: 10px; letter-spacing: 2px;
    cursor: pointer; transition: all 0.3s;
    text-transform: uppercase; width: 100%;
  }
  .cmd-btn:hover {
    background: rgba(132,204,22,0.12);
    border-color: rgba(132,204,22,0.5);
    box-shadow: 0 0 15px rgba(132,204,22,0.15);
  }
</style>
</head>
<body>

<div class="vignette"></div>
<div class="grid-floor"></div>

<div class="top-bar">
  <div class="sys-label">SYS://CLAUDEBORN</div>
  <div class="stats">
    <span><span class="val">14</span> OPS</span>
    <span><span class="val">10</span> READY</span>
    <span><span class="val">4</span> PENDING</span>
  </div>
</div>

<div class="edge-readout right">STAGE VIEW // DETAIL MODE // READY</div>
<div class="edge-readout bottom-right">UPLINK 2026.03.22 // SESSION ACTIVE</div>

<svg class="connections-svg" id="connectionsSvg"></svg>

<!-- Left panel -->
<div class="left-panel">
  <div class="panel-header">OPERATIONS ROSTER</div>
  <div class="panel-list" id="panelList"></div>
  <div class="panel-bottom">
    <button class="cmd-btn">+ NEW OPERATION</button>
    <button class="cmd-btn">+ RECRUIT EXISTING</button>
  </div>
</div>

<!-- Right stage -->
<div class="right-stage" id="rightStage">
  <div class="stage-hud">
    <svg width="300" height="300" viewBox="-150 -150 300 300">
      <circle cx="0" cy="0" r="90" fill="none" stroke="rgba(132,204,22,0.08)" stroke-width="1" stroke-dasharray="6,10"/>
      <circle cx="0" cy="0" r="120" fill="none" stroke="rgba(132,204,22,0.04)" stroke-width="1"/>
      <!-- tick marks -->
      <line x1="0" y1="-95" x2="0" y2="-105" stroke="rgba(132,204,22,0.15)" stroke-width="1"/>
      <line x1="0" y1="95" x2="0" y2="105" stroke="rgba(132,204,22,0.15)" stroke-width="1"/>
      <line x1="-95" y1="0" x2="-105" y2="0" stroke="rgba(132,204,22,0.15)" stroke-width="1"/>
      <line x1="95" y1="0" x2="105" y2="0" stroke="rgba(132,204,22,0.15)" stroke-width="1"/>
    </svg>
  </div>
  <div class="hal-eye"></div>
  <div class="stage-detail" id="stageDetail">
    <div class="detail-name" id="detailName">CLAUDEBORN</div>
    <div class="detail-stack" id="detailStack">ELECTRON/REACT</div>
    <div class="detail-row">STATUS: <span class="val" id="detailStatus">READY</span></div>
    <div class="detail-row">UPTIME: <span class="val">14h 32m</span></div>
    <div class="detail-row">COMMITS: <span class="val">247</span></div>
    <div class="detail-row">AGENTS: <span class="val">2 ACTIVE</span></div>
  </div>
</div>

<script>
const projects = [
  { name: 'CLAUDEBORN', stack: 'ELECTRON/REACT', status: 'ready' },
  { name: 'SNOWFINDER', stack: 'NEXT.JS', status: 'ready' },
  { name: 'PREZSANDRINE', stack: 'REACT/VITE', status: 'ready' },
  { name: 'INEVITABLESTUDIO', stack: 'UNITY/C#', status: 'pending' },
  { name: 'OFFLINEGAME', stack: 'GODOT/GDSCRIPT', status: 'ready' },
  { name: 'COMMUNITYSCANNER', stack: 'PYTHON/FAST', status: 'ready' },
  { name: 'DNDMAPBUILDER', stack: 'REACT/CANVAS', status: 'pending' },
  { name: 'SCRIPT2UNREAL', stack: 'PYTHON/UE5', status: 'ready' },
  { name: 'PIXELAGENTMONITOR', stack: 'ELECTRON', status: 'ready' },
  { name: 'CLAUDEPRODUCTFINDER', stack: 'NEXT.JS/AI', status: 'pending' },
  { name: 'CINEMASTER-DEMO', stack: 'REACT/THREE', status: 'ready' },
  { name: 'PIXEL-AGENTS', stack: 'PYTHON/ML', status: 'ready' },
  { name: 'MODELTRAINING', stack: 'PYTHON/TORCH', status: 'pending' },
  { name: 'CLAUDEDOWNLOAD', stack: 'NODE.JS/CLI', status: 'ready' },
];

const panelList = document.getElementById('panelList');

projects.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'panel-card' + (i === 0 ? ' active' : '');
  card.innerHTML = `
    <div class="card-header">
      <div class="status-dot ${p.status}"></div>
      <div class="card-name">${p.name}</div>
    </div>
    <div class="card-stack">${p.stack}</div>
  `;
  card.addEventListener('click', () => {
    document.querySelectorAll('.panel-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    document.getElementById('detailName').textContent = p.name;
    document.getElementById('detailStack').textContent = p.stack;
    document.getElementById('detailStatus').textContent = p.status.toUpperCase();
  });
  panelList.appendChild(card);
});

// Draw connection lines from panel to stage center
const svg = document.getElementById('connectionsSvg');
requestAnimationFrame(() => {
  const stageRect = document.getElementById('rightStage').getBoundingClientRect();
  const stageCx = stageRect.left + stageRect.width / 2;
  const stageCy = stageRect.top + stageRect.height / 2;

  document.querySelectorAll('.panel-card').forEach(card => {
    const rect = card.getBoundingClientRect();
    const cardX = rect.right;
    const cardY = rect.top + rect.height / 2;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', cardX); line.setAttribute('y1', cardY);
    line.setAttribute('x2', stageCx); line.setAttribute('y2', stageCy);
    line.setAttribute('stroke', 'rgba(132,204,22,0.05)');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('stroke-dasharray', '3,8');
    svg.appendChild(line);
  });
});
</script>
</body>
</html>
