<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAL-O — Manage Projects: Org-Chart Tree Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #050810;
            --bg-secondary: #0a0f1a;
            --cyan: #00e5ff;
            --green: #22c55e;
            --pink: #ec4899;
            --orange: #f97316;
            --blue: #3b82f6;
            --purple: #a855f7;
            --gray: #6b7280;
            --accent: #00e5ff;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-dark);
            color: #e0e7ff;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        /* Top Bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: linear-gradient(180deg, rgba(10, 15, 26, 0.8), rgba(5, 8, 16, 0.6));
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 100;
            gap: 16px;
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 24px;
            flex: 1;
        }

        .topbar-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
            white-space: nowrap;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(10, 15, 26, 0.6);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 6px;
            padding: 8px 12px;
            width: 250px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0e7ff;
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(224, 231, 255, 0.4);
        }

        .view-toggle {
            display: flex;
            gap: 8px;
            background: rgba(10, 15, 26, 0.6);
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 6px;
            padding: 4px;
        }

        .view-toggle button {
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: rgba(224, 231, 255, 0.6);
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .view-toggle button.active {
            background: var(--cyan);
            color: var(--bg-dark);
            font-weight: 600;
        }

        .view-toggle button:hover:not(.active) {
            color: var(--cyan);
        }

        .topbar-right {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.1), rgba(34, 197, 94, 0.1));
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 6px;
            color: var(--cyan);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .btn:hover {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(34, 197, 94, 0.2));
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
            border-color: var(--cyan);
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(0, 229, 255, 0.1));
            border-color: var(--green);
            color: var(--green);
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }

        .btn-reset {
            padding: 6px 10px;
            font-size: 11px;
            background: rgba(107, 114, 128, 0.1);
            border-color: rgba(107, 114, 128, 0.3);
            color: var(--gray);
        }

        .btn-reset:hover {
            background: rgba(107, 114, 128, 0.2);
            border-color: var(--gray);
            box-shadow: none;
        }

        /* Main Content */
        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .canvas-area {
            flex: 1;
            position: relative;
            background: linear-gradient(135deg, #050810 0%, #0a0f1a 100%);
            overflow: hidden;
            cursor: grab;
        }

        .canvas-area.grabbing {
            cursor: grabbing;
        }

        .grid-bg {
            position: absolute;
            width: 300%;
            height: 300%;
            top: -100%;
            left: -100%;
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(0, 229, 255, 0.04) 25%, rgba(0, 229, 255, 0.04) 26%, transparent 27%, transparent 74%, rgba(0, 229, 255, 0.04) 75%, rgba(0, 229, 255, 0.04) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 229, 255, 0.04) 25%, rgba(0, 229, 255, 0.04) 26%, transparent 27%, transparent 74%, rgba(0, 229, 255, 0.04) 75%, rgba(0, 229, 255, 0.04) 76%, transparent 77%, transparent);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 1;
        }

        .pan-zoom-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            z-index: 2;
        }

        svg.connections {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: visible;
        }

        .cards-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
        }

        /* Cards */
        .card {
            position: absolute;
            width: 200px;
            padding: 16px;
            background: linear-gradient(135deg, rgba(10, 15, 26, 0.7), rgba(15, 23, 42, 0.5));
            border: 2px solid rgba(0, 229, 255, 0.2);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            cursor: move;
            transition: box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease, opacity 0.3s ease;
            user-select: none;
            touch-action: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        .card:hover {
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
        }

        .card.selected {
            border-color: var(--cyan);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.5), 0 12px 48px rgba(0, 0, 0, 0.6);
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.1), rgba(15, 23, 42, 0.7));
        }

        .card.dispatcher { --color: var(--cyan); }
        .card.project { --color: var(--green); }
        .card.agent { --color: var(--pink); }
        .card.group { --color: var(--gray); }

        .card:hover {
            border-color: var(--color);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.3), 0 12px 48px rgba(0, 0, 0, 0.6);
        }

        .card.dragging {
            z-index: 100;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.4), 0 20px 60px rgba(0, 0, 0, 0.8);
            opacity: 0.9;
        }

        .card-icon {
            font-size: 28px;
            margin-bottom: 8px;
            display: inline-block;
        }

        .card-name {
            font-size: 13px;
            font-weight: 600;
            color: #e0e7ff;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .card-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 4px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 4px;
            font-size: 10px;
            color: var(--cyan);
            letter-spacing: 0.3px;
        }

        .badge.type-dispatcher {
            background: rgba(0, 229, 255, 0.1);
            border-color: rgba(0, 229, 255, 0.3);
            color: var(--cyan);
        }

        .badge.type-project {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: var(--green);
        }

        .badge.type-group {
            background: rgba(107, 114, 128, 0.1);
            border-color: rgba(107, 114, 128, 0.3);
            color: var(--gray);
        }

        .badge.voice {
            background: rgba(236, 72, 153, 0.1);
            border-color: rgba(236, 72, 153, 0.3);
            color: var(--pink);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 4px;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.offline {
            background: var(--gray);
            animation: none;
        }

        .status-dot.loading {
            background: var(--orange);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes dashFlow {
            to { stroke-dashoffset: -20; }
        }

        /* Detail Panel */
        .detail-panel {
            width: 320px;
            min-width: 320px;
            background: linear-gradient(180deg, rgba(10, 15, 26, 0.9), rgba(5, 8, 16, 0.8));
            border-left: 1px solid rgba(0, 229, 255, 0.1);
            backdrop-filter: blur(10px);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
            z-index: 50;
            display: flex;
            flex-direction: column;
        }

        .detail-panel.open {
            transform: translateX(0);
        }

        .detail-header {
            padding: 24px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
            position: sticky;
            top: 0;
            background: linear-gradient(180deg, rgba(10, 15, 26, 0.95), rgba(5, 8, 16, 0.85));
            backdrop-filter: blur(10px);
        }

        .detail-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 4px;
            background: rgba(0, 229, 255, 0.05);
            color: rgba(224, 231, 255, 0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .detail-close:hover {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(0, 229, 255, 0.15);
        }

        .detail-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .detail-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--cyan);
            margin-bottom: 8px;
        }

        .detail-type {
            font-size: 12px;
            color: rgba(224, 231, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--cyan);
            margin-bottom: 12px;
            opacity: 0.8;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
        }

        .detail-field {
            margin-bottom: 16px;
        }

        .detail-label {
            font-size: 12px;
            color: rgba(224, 231, 255, 0.6);
            margin-bottom: 6px;
            display: block;
        }

        .detail-value {
            font-size: 12px;
            color: #e0e7ff;
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 4px;
            padding: 8px;
            font-family: 'JetBrains Mono', monospace;
            word-break: break-all;
        }

        .detail-input {
            width: 100%;
            padding: 8px;
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 4px;
            color: #e0e7ff;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .detail-input:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
            background: rgba(0, 229, 255, 0.1);
        }

        .select-list {
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.2);
        }

        .select-item {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.05);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            color: rgba(224, 231, 255, 0.8);
        }

        .select-item:hover {
            background: rgba(0, 229, 255, 0.1);
            color: var(--cyan);
        }

        .select-item.active {
            background: rgba(0, 229, 255, 0.15);
            border-left: 3px solid var(--cyan);
            padding-left: 9px;
            color: var(--cyan);
            font-weight: 600;
        }

        .children-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .child-item {
            padding: 8px 12px;
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 4px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(224, 231, 255, 0.8);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .child-item:hover {
            background: rgba(0, 229, 255, 0.1);
            border-color: var(--cyan);
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(0, 229, 255, 0.1);
        }

        .action-btn {
            padding: 10px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 4px;
            background: rgba(0, 229, 255, 0.05);
            color: var(--cyan);
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: rgba(0, 229, 255, 0.15);
            border-color: var(--cyan);
        }

        .action-btn.danger {
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.05);
            color: #ef4444;
        }

        .action-btn.danger:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: #ef4444;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(135deg, rgba(10, 15, 26, 0.95), rgba(5, 8, 16, 0.9));
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--cyan);
            margin-bottom: 24px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        .modal-field {
            margin-bottom: 20px;
        }

        .modal-label {
            font-size: 12px;
            color: rgba(224, 231, 255, 0.7);
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 6px;
            color: #e0e7ff;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            background: rgba(0, 229, 255, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 6px;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.1), rgba(34, 197, 94, 0.1));
            color: var(--cyan);
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .modal-btn:hover {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(34, 197, 94, 0.2));
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            border-color: var(--cyan);
        }

        .modal-btn.cancel {
            background: rgba(107, 114, 128, 0.1);
            border-color: rgba(107, 114, 128, 0.3);
            color: var(--gray);
        }

        .modal-btn.cancel:hover {
            background: rgba(107, 114, 128, 0.2);
            border-color: var(--gray);
        }

        /* Zoom indicator */
        .zoom-indicator {
            position: absolute;
            bottom: 16px;
            left: 16px;
            padding: 6px 12px;
            background: rgba(10, 15, 26, 0.8);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 4px;
            font-size: 11px;
            color: rgba(224, 231, 255, 0.5);
            z-index: 30;
            pointer-events: none;
            backdrop-filter: blur(6px);
            letter-spacing: 0.5px;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 229, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 229, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 229, 255, 0.4);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 16px;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.15), rgba(34, 197, 94, 0.1));
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 6px;
            color: var(--cyan);
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            z-index: 300;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Minimap */
        .minimap {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 180px;
            height: 120px;
            background: rgba(5, 8, 16, 0.85);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 6px;
            z-index: 30;
            overflow: hidden;
            backdrop-filter: blur(6px);
        }

        .minimap-viewport {
            position: absolute;
            border: 1px solid rgba(0, 229, 255, 0.5);
            background: rgba(0, 229, 255, 0.05);
            pointer-events: none;
        }

        .minimap-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Bar -->
        <div class="topbar">
            <div class="topbar-left">
                <div class="topbar-title">HAL-O  /  MANAGE PROJECTS</div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Filter by name...">
                </div>
            </div>
            <div class="view-toggle">
                <button data-view="cards">Cards</button>
                <button class="active" data-view="tree">Tree</button>
                <button data-view="3d">3D</button>
            </div>
            <div class="topbar-right">
                <button class="btn btn-reset" id="resetViewBtn" title="Reset zoom and position">Reset View</button>
                <button class="btn" id="importBtn">Import Project</button>
                <button class="btn btn-primary" id="newDispatcherBtn">+ New Dispatcher</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content">
            <div class="canvas-area" id="canvasArea">
                <div class="grid-bg" id="gridBg"></div>
                <div class="pan-zoom-layer" id="panZoomLayer">
                    <svg class="connections" id="connections" xmlns="http://www.w3.org/2000/svg"></svg>
                    <div class="cards-container" id="cardsContainer"></div>
                </div>
                <div class="zoom-indicator" id="zoomIndicator">100%</div>
                <div class="minimap" id="minimap"></div>
            </div>

            <!-- Detail Panel -->
            <div class="detail-panel" id="detailPanel">
                <div class="detail-header">
                    <button class="detail-close" id="detailClose">&times;</button>
                    <div class="detail-icon" id="detailIcon"></div>
                    <div class="detail-name" id="detailName">Select a node</div>
                    <div class="detail-type" id="detailType">dispatcher</div>
                </div>
                <div class="detail-content">

        };

        // ===== CONSTANTS =====
        const CARD_W = 200;
        const CARD_H = 110;
        const H_GAP = 30;
        const V_GAP = 180;
        const TOP_PADDING = 60;

        // ===== STATE =====
        let selectedNode = null;
        let draggedNode = null;
        let dragStartX = 0, dragStartY = 0;
        let dragNodeStartX = 0, dragNodeStartY = 0;
        let allNodes = [];

        // Pan/zoom state
        let panX = 0, panY = 0, zoom = 1;
        let isPanning = false;
        let panStartX = 0, panStartY = 0;
        let panStartPanX = 0, panStartPanY = 0;

        // ===== COLOR UTILITIES =====
        function getColorValue(color) {
            const colors = {
                cyan: '#00e5ff', green: '#22c55e', pink: '#ec4899',
                orange: '#f97316', blue: '#3b82f6', purple: '#a855f7', gray: '#6b7280'
            };
            return colors[color] || colors.cyan;
        }

        // ===== TREE LAYOUT ALGORITHM =====
        // Assigns x, y to each node using a bottom-up width calculation
        function layoutTree(root) {
            // 1. Compute subtree width for every node (leaf = CARD_W, branch = sum of children + gaps)
            function computeWidth(node) {
                if (!node.children || node.children.length === 0) {
                    node._subtreeWidth = CARD_W;
                } else {
                    node.children.forEach(computeWidth);
                    const totalChildWidth = node.children.reduce((s, c) => s + c._subtreeWidth, 0)
                        + H_GAP * (node.children.length - 1);
                    node._subtreeWidth = Math.max(CARD_W, totalChildWidth);
                }
                return node._subtreeWidth;
            }

            // 2. Assign x, y positions top-down
            function assignPositions(node, depth, leftEdge) {
                node._depth = depth;
                node.y = TOP_PADDING + depth * V_GAP;

                if (!node.children || node.children.length === 0) {
                    // Center this leaf within its allocated subtree width
                    node.x = leftEdge + (node._subtreeWidth - CARD_W) / 2;
                } else {
                    // Place children left-to-right within this node's subtree width
                    let childLeft = leftEdge;
                    node.children.forEach(child => {
                        assignPositions(child, depth + 1, childLeft);
                        childLeft += child._subtreeWidth + H_GAP;
                    });
                    // Center this node over its children
                    const firstChild = node.children[0];
                    const lastChild = node.children[node.children.length - 1];
                    const childrenCenter = (firstChild.x + lastChild.x + CARD_W) / 2;
                    node.x = childrenCenter - CARD_W / 2;
                }
            }

            computeWidth(root);
            assignPositions(root, 0, 0);
        }

        // ===== FLATTEN TREE =====
        function flattenTree(node, parent) {
            node.parent = parent || null;
            allNodes.push(node);
            if (node.children) {
                node.children.forEach(child => flattenTree(child, node));
            }
        }

        // ===== RENDERING =====
        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            allNodes.forEach(node => {
                const card = document.createElement('div');
                card.className = `card ${node.type}`;
                card.id = `card-${node.id}`;
                card.style.left = node.x + 'px';
                card.style.top = node.y + 'px';
                card.style.width = CARD_W + 'px';

                // Color tint on border
                const nodeColor = getColorValue(node.color || (node.type === 'project' ? 'green' : node.type === 'group' ? 'gray' : 'cyan'));
                card.style.borderColor = nodeColor + '40';

                let badgesHTML = `<div class="badge type-${node.type}"><span class="status-dot ${node.status}"></span>${node.type}</div>`;
                if (node.voice) badgesHTML += `<div class="badge voice">\u{1F3A4} ${node.voice}</div>`;
                if (node.stack) badgesHTML += `<div class="badge type-project">${node.stack}</div>`;

                card.innerHTML = `
                    <div class="card-icon">${node.icon}</div>
                    <div class="card-name">${node.name}</div>
                    <div class="card-badges">${badgesHTML}</div>
                `;

                card.addEventListener('mousedown', (e) => onCardMouseDown(e, node));
                card.addEventListener('click', (e) => {
                    // Only select if we didn't drag
                    if (!node._wasDragged) {
                        e.stopPropagation();
                        selectNode(node);
                    }
                    node._wasDragged = false;
                });

                container.appendChild(card);
            });
        }

        function renderConnections() {
            const svg = document.getElementById('connections');
            svg.innerHTML = '';

            allNodes.forEach(node => {
                if (!node.parent) return;

                const parent = node.parent;
                // Parent bottom-center
                const x1 = parent.x + CARD_W / 2;
                const y1 = parent.y + CARD_H;
                // Child top-center
                const x2 = node.x + CARD_W / 2;
                const y2 = node.y;
                // Midpoint Y for the elbow
                const midY = y1 + (y2 - y1) / 2;

                const color = getColorValue(parent.color || 'cyan');

                // Orthogonal elbow path: down from parent, horizontal, down to child
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M ${x1} ${y1} L ${x1} ${midY} L ${x2} ${midY} L ${x2} ${y2}`);
                path.setAttribute('stroke', color);
                path.setAttribute('stroke-width', '2');
                path.setAttribute('fill', 'none');
                path.setAttribute('opacity', '0.3');
                path.setAttribute('stroke-linecap', 'round');
                path.setAttribute('stroke-linejoin', 'round');
                svg.appendChild(path);

                // Animated dash overlay
                const dashPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                dashPath.setAttribute('d', `M ${x1} ${y1} L ${x1} ${midY} L ${x2} ${midY} L ${x2} ${y2}`);
                dashPath.setAttribute('stroke', color);
                dashPath.setAttribute('stroke-width', '1.5');
                dashPath.setAttribute('fill', 'none');
                dashPath.setAttribute('opacity', '0.15');
                dashPath.setAttribute('stroke-dasharray', '6,14');
                dashPath.setAttribute('stroke-linecap', 'round');
                dashPath.setAttribute('stroke-linejoin', 'round');
                dashPath.style.animation = 'dashFlow 2s linear infinite';
                svg.appendChild(dashPath);

                // Small dot at the junction point on the child end
                const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                dot.setAttribute('cx', x2);
                dot.setAttribute('cy', y2);
                dot.setAttribute('r', '3');
                dot.setAttribute('fill', color);
                dot.setAttribute('opacity', '0.4');
                svg.appendChild(dot);
            });
        }

        function renderMinimap() {
            const minimap = document.getElementById('minimap');
            minimap.innerHTML = '';

            if (allNodes.length === 0) return;

            // Compute bounding box of all nodes
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            allNodes.forEach(n => {
                minX = Math.min(minX, n.x);
                minY = Math.min(minY, n.y);
                maxX = Math.max(maxX, n.x + CARD_W);
                maxY = Math.max(maxY, n.y + CARD_H);
            });

            const treeW = maxX - minX + 40;
            const treeH = maxY - minY + 40;
            const mmW = 180, mmH = 120;
            const scale = Math.min(mmW / treeW, mmH / treeH);

            // Draw dots for each node
            allNodes.forEach(n => {
                const dot = document.createElement('div');
                dot.className = 'minimap-dot';
                const nodeColor = getColorValue(n.color || (n.type === 'project' ? 'green' : n.type === 'group' ? 'gray' : 'cyan'));
                dot.style.background = nodeColor;
                dot.style.left = ((n.x - minX + 20) * scale) + 'px';
                dot.style.top = ((n.y - minY + 20) * scale) + 'px';
                dot.style.width = Math.max(3, CARD_W * scale) + 'px';
                dot.style.height = Math.max(2, CARD_H * scale * 0.3) + 'px';
                dot.style.borderRadius = '1px';
                minimap.appendChild(dot);
            });

            // Draw viewport rect
            const canvasArea = document.getElementById('canvasArea');
            const vw = canvasArea.clientWidth;
            const vh = canvasArea.clientHeight;
            const vpRect = document.createElement('div');
            vpRect.className = 'minimap-viewport';
            const vpX = (-panX / zoom - minX + 20) * scale;
            const vpY = (-panY / zoom - minY + 20) * scale;
            const vpW = (vw / zoom) * scale;
            const vpH = (vh / zoom) * scale;
            vpRect.style.left = Math.max(0, vpX) + 'px';
            vpRect.style.top = Math.max(0, vpY) + 'px';
            vpRect.style.width = Math.min(mmW, vpW) + 'px';
            vpRect.style.height = Math.min(mmH, vpH) + 'px';
            minimap.appendChild(vpRect);
        }

        // ===== PAN & ZOOM =====
        function applyTransform() {
            const layer = document.getElementById('panZoomLayer');
            layer.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;

            const grid = document.getElementById('gridBg');
            grid.style.transform = `translate(${panX * 0.3}px, ${panY * 0.3}px)`;

            document.getElementById('zoomIndicator').textContent = Math.round(zoom * 100) + '%';
            renderMinimap();
        }

        function centerTreeInView() {
            if (allNodes.length === 0) return;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            allNodes.forEach(n => {
                minX = Math.min(minX, n.x);
                minY = Math.min(minY, n.y);
                maxX = Math.max(maxX, n.x + CARD_W);
                maxY = Math.max(maxY, n.y + CARD_H);
            });

            const treeW = maxX - minX;
            const treeH = maxY - minY;
            const canvasArea = document.getElementById('canvasArea');
            const vw = canvasArea.clientWidth;
            const vh = canvasArea.clientHeight;

            // Fit to viewport with some padding
            const fitZoom = Math.min(1.0, (vw - 80) / treeW, (vh - 80) / treeH);
            zoom = Math.max(0.3, fitZoom);

            const treeCenterX = (minX + maxX) / 2;
            const treeCenterY = (minY + maxY) / 2;
            panX = vw / 2 - treeCenterX * zoom;
            panY = vh / 2 - treeCenterY * zoom;

            applyTransform();
        }

        // ===== CARD DRAG =====
        function onCardMouseDown(e, node) {
            if (e.button !== 0) return;
            e.stopPropagation();

            draggedNode = node;
            node._wasDragged = false;

            // Compute mouse position in tree-space
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragNodeStartX = node.x;
            dragNodeStartY = node.y;

            const card = document.getElementById(`card-${node.id}`);
            card.classList.add('dragging');

            document.addEventListener('mousemove', onCardMouseMove);
            document.addEventListener('mouseup', onCardMouseUp);
        }

        function onCardMouseMove(e) {
            if (!draggedNode) return;
            const dx = (e.clientX - dragStartX) / zoom;
            const dy = (e.clientY - dragStartY) / zoom;

            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                draggedNode._wasDragged = true;
            }

            draggedNode.x = dragNodeStartX + dx;
            draggedNode.y = dragNodeStartY + dy;

            const card = document.getElementById(`card-${draggedNode.id}`);
            card.style.left = draggedNode.x + 'px';
            card.style.top = draggedNode.y + 'px';
            renderConnections();
        }

        function onCardMouseUp() {
            if (draggedNode) {
                const card = document.getElementById(`card-${draggedNode.id}`);
                card.classList.remove('dragging');
                draggedNode = null;
            }
            document.removeEventListener('mousemove', onCardMouseMove);
            document.removeEventListener('mouseup', onCardMouseUp);
            renderMinimap();
        }

        // ===== CANVAS PAN =====
        function onCanvasMouseDown(e) {
            if (e.target.closest('.card') || e.target.closest('.minimap')) return;
            if (e.button !== 0) return;

            isPanning = true;
            panStartX = e.clientX;
            panStartY = e.clientY;
            panStartPanX = panX;
            panStartPanY = panY;

            document.getElementById('canvasArea').classList.add('grabbing');
            document.addEventListener('mousemove', onCanvasPan);
            document.addEventListener('mouseup', onCanvasPanEnd);
        }

        function onCanvasPan(e) {
            if (!isPanning) return;
            panX = panStartPanX + (e.clientX - panStartX);
            panY = panStartPanY + (e.clientY - panStartY);
            applyTransform();
        }

        function onCanvasPanEnd() {
            isPanning = false;
            document.getElementById('canvasArea').classList.remove('grabbing');
            document.removeEventListener('mousemove', onCanvasPan);
            document.removeEventListener('mouseup', onCanvasPanEnd);
        }

        // ===== ZOOM (scroll wheel) =====
        function onWheel(e) {
            e.preventDefault();
            const canvasArea = document.getElementById('canvasArea');
            const rect = canvasArea.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const oldZoom = zoom;
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            zoom = Math.min(3, Math.max(0.15, zoom * delta));

            // Zoom toward mouse position
            panX = mouseX - (mouseX - panX) * (zoom / oldZoom);
            panY = mouseY - (mouseY - panY) * (zoom / oldZoom);

            applyTransform();
        }

        // ===== SELECT / DETAIL =====
        function selectNode(node) {
            if (selectedNode) {
                const prev = document.getElementById(`card-${selectedNode.id}`);
                if (prev) prev.classList.remove('selected');

            document.getElementById(`card-${node.id}`).classList.add('selected');
            showDetailPanel(node);
        }

        }

        function closeDetailPanel() {
            if (selectedNode) {
                const card = document.getElementById(`card-${selectedNode.id}`);
                if (card) card.classList.remove('selected');
                selectedNode = null;
            }
            document.getElementById('detailPanel').classList.remove('open');

        function focusOnNode(nodeId) {
            const node = allNodes.find(n => n.id === nodeId);
            if (!node) return;

            const canvasArea = document.getElementById('canvasArea');
            const vw = canvasArea.clientWidth;
            const vh = canvasArea.clientHeight;

            zoom = 1;
            panX = vw / 2 - (node.x + CARD_W / 2) * zoom;
            panY = vh / 2 - (node.y + CARD_H / 2) * zoom;
            applyTransform();
        }

        // ===== SEARCH =====
        function onSearch(query) {
            query = query.toLowerCase().trim();
            allNodes.forEach(node => {
                const card = document.getElementById(`card-${node.id}`);
                if (!card) return;
                const match = !query || node.name.toLowerCase().includes(query) || (node.stack && node.stack.toLowerCase().includes(query));
                card.style.opacity = match ? '1' : '0.15';
                card.style.pointerEvents = match ? 'auto' : 'none';
            });
        }

        // ===== EVENT SETUP =====
        function setupEventListeners() {
            const canvasArea = document.getElementById('canvasArea');

            // Pan
            canvasArea.addEventListener('mousedown', onCanvasMouseDown);

            // Zoom
            canvasArea.addEventListener('wheel', onWheel, { passive: false });

            // Search
            document.getElementById('searchInput').addEventListener('input', (e) => onSearch(e.target.value));

            // Close detail panel
            document.getElementById('detailClose').addEventListener('click', closeDetailPanel);

            // Click on empty canvas to deselect
            canvasArea.addEventListener('click', (e) => {
                if (!e.target.closest('.card') && !e.target.closest('.minimap') && !isPanning) {
                    closeDetailPanel();
                }
            });

            // View toggles
            document.querySelectorAll('.view-toggle button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    if (e.target.dataset.view !== 'tree') {
                        showToast('View mode: ' + e.target.dataset.view + ' (coming soon)');
                    }
                });
            });

            // Buttons
            document.getElementById('importBtn').addEventListener('click', openImportModal);
            document.getElementById('newDispatcherBtn').addEventListener('click', () => {
                showToast('New dispatcher created!');
            });
            document.getElementById('resetViewBtn').addEventListener('click', () => {
                // Reset any manual drag positions
                layoutTree(projectTree);
                allNodes = [];
                flattenTree(projectTree);
                renderCards();
                renderConnections();
                centerTreeInView();
            });

            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal();
                    closeDetailPanel();
                }
            });

            // Resize
            window.addEventListener('resize', () => {
                renderMinimap();
            });
        }

        // ===== MODAL =====
        function openImportModal() {
            document.getElementById('importModal').classList.add('active');
            const parentList = document.getElementById('importParentList');
            parentList.innerHTML = allNodes
                .filter(n => n.type === 'dispatcher' || n.type === 'group')
                .map(n => `<div class="select-item" data-id="${n.id}">${n.icon} ${n.name}</div>`)
                .join('');

            parentList.querySelectorAll('.select-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    parentList.querySelectorAll('.select-item').forEach(i => i.classList.remove('active'));
                    e.target.classList.add('active');
                });
            });
        }

        function closeModal() {
            document.getElementById('importModal').classList.remove('active');
        }

        function confirmImport() {
            const path = document.getElementById('importPath').value;
            const name = document.getElementById('importName').value;
            if (path && name) {
                showToast('Imported: ' + name);
                closeModal();
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.transition = 'opacity 0.3s ease';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // ===== INIT =====
        function init() {
            layoutTree(projectTree);
            flattenTree(projectTree);
            renderCards();
            renderConnections();
            setupEventListeners();

            // Center the tree in the viewport after first paint
            requestAnimationFrame(() => {
                centerTreeInView();
            });
        }

        init();
    </script>
</body>
</html>
