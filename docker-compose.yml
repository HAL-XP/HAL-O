services:
  test:
    build: .
    # Mount source for live iteration, but keep node_modules and out/ from the image
    # so the Docker-built native modules and compiled app are not overwritten by the host.
    volumes:
      - .:/app
      - /app/node_modules
      - /app/out
      - screenshots:/app/screenshots
    environment:
      - DISPLAY=:99
      - CI=true
      - ANTHROPIC_API_KEY=
      - NODE_ENV=test
    command: >
      xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24"
      npx playwright test --reporter=line

  # Fresh install simulation — no API key, no gh auth, no Python extras
  test-fresh:
    build: .
    environment:
      - DISPLAY=:99
      - CI=true
      - ANTHROPIC_API_KEY=
      - HOME=/tmp/fresh-user
      - NODE_ENV=test
    command: >
      bash -c "mkdir -p /tmp/fresh-user &&
      xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24'
      npx playwright test --reporter=line"

  # Interactive — opens a shell for manual testing
  shell:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
      - /app/out
    environment:
      - DISPLAY=:99
      - CI=true
    command: bash
    stdin_open: true
    tty: true

volumes:
  screenshots:
