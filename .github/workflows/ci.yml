name: CI

on:
  push:
    branches: [master]

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (skip node-pty rebuild)
        run: npm ci --ignore-scripts
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0

      - name: Download Electron binary (skipped by --ignore-scripts)
        run: node node_modules/electron/install.js

      - name: Install Playwright Chromium (required by @playwright/test runner)
        run: npx playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0

      - name: Build with electron-vite
        run: npx electron-vite build

      - name: Install Electron system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libnss3 \
            libgbm1 \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxshmfence1 \
            libxss1

      - name: Run E2E smoke tests
        run: xvfb-run --auto-servernum npx playwright test e2e/smoke.spec.ts e2e/setup-fresh.spec.ts
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          CI: true

      - name: Run E2E session3 tests
        run: xvfb-run --auto-servernum npx playwright test e2e/session3.spec.ts
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          CI: true

      - name: Run E2E wizard-flow tests
        run: xvfb-run --auto-servernum npx playwright test e2e/wizard-flow.spec.ts
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          CI: true

      - name: Run E2E voice-preview tests
        # voice-preview verifies IPC contract but TTS binaries absent on CI — allowed to fail
        run: xvfb-run --auto-servernum npx playwright test e2e/voice-preview.spec.ts
        continue-on-error: true
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-linux
          path: screenshots/
          retention-days: 7

  test-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (skip node-pty rebuild)
        run: npm ci --ignore-scripts
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0

      - name: Download Electron binary (skipped by --ignore-scripts)
        run: node node_modules/electron/install.js

      - name: Install Playwright Chromium (required by @playwright/test runner)
        run: npx playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0

      - name: Build with electron-vite
        run: npx electron-vite build

      - name: Run E2E smoke tests
        run: npx playwright test e2e/smoke.spec.ts e2e/setup-fresh.spec.ts
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          CI: true

      - name: Run E2E session3 tests
        run: npx playwright test e2e/session3.spec.ts
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          CI: true

      - name: Run E2E wizard-flow tests
        run: npx playwright test e2e/wizard-flow.spec.ts
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          CI: true

      - name: Run E2E voice-preview tests
        # voice-preview verifies IPC contract but TTS binaries absent on CI — allowed to fail
        run: npx playwright test e2e/voice-preview.spec.ts
        continue-on-error: true
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-windows
          path: screenshots/
          retention-days: 7

  test-start-here:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run START_HERE.bat (skip VS Build Tools, verify build output)
        shell: cmd
        timeout-minutes: 15
        run: |
          REM Pipe "3" to skip VS Build Tools prompt. START_HERE.bat hangs at
          REM pause + npm run dev at the end, but we only need it to get through
          REM steps 1-6 (Node check, npm install, patches skip, build).
          REM The _setup.log file records all steps for verification.
          echo 3| call START_HERE.bat run
          REM If we reach here, the script completed (or npm run dev exited).
          REM On CI the npm run dev will fail immediately (no Electron display),
          REM which causes START_HERE.bat to fall through to the final pause.
          REM The piped stdin satisfies the pause, so the script exits cleanly.

      - name: Verify build output and check for parse errors
        shell: powershell
        run: |
          # Check the setup log for parse errors
          if (Test-Path "_setup.log") {
            Write-Host "=== _setup.log ==="
            Get-Content "_setup.log"
            $log = Get-Content "_setup.log" -Raw
            if ($log -match 'was unexpected at this time|inattendu|syntax error') {
              Write-Error "START_HERE.bat has a parse/syntax error in the log!"
              exit 1
            }
          } else {
            Write-Host "WARNING: _setup.log not found (script may have crashed early)"
          }
          # Check that electron-vite build produced output
          if (Test-Path "out\main\index.js") {
            Write-Host "PASS: out\main\index.js exists - full build succeeded"
          } else {
            Write-Error "FAIL: out\main\index.js not found - build did not complete"
            exit 1
          }

      - name: Upload setup log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: start-here-log
          path: |
            _setup.log
            start_here_out.txt
            start_here_err.txt
          retention-days: 7

  # ── Telegram notifications ──────────────────────────────────────────
  # Requires repo secrets: TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID
  # Add them at: Settings → Secrets and variables → Actions → New repository secret

  notify-failure:
    needs: [test-linux, test-windows, test-start-here]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        run: |
          MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          printf -v TEXT '🔴 CI FAILED: %s\nmaster · %s\n%s' "$MSG" "$SHORT_SHA" "$RUN_URL"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${TEXT}"

  notify-success:
    needs: [test-linux, test-windows, test-start-here]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        run: |
          MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          printf -v TEXT '✅ %s\nmaster · %s' "$MSG" "$SHORT_SHA"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${TEXT}"
