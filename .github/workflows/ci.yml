name: CI

on:
  push:
    branches: [master]

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (skip node-pty rebuild)
        run: npm ci --ignore-scripts
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0

      - name: Build with electron-vite
        run: npx electron-vite build

      - name: Install Electron system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libnss3 libgbm1 libasound2t64 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libxshmfence1

      - name: Run E2E smoke tests
        run: xvfb-run --auto-servernum npx playwright test e2e/smoke.spec.ts e2e/wizard-flow.spec.ts
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-linux
          path: screenshots/
          retention-days: 7

  test-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (skip node-pty rebuild)
        run: npm ci --ignore-scripts
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0

      - name: Build with electron-vite
        run: npx electron-vite build

      - name: Run E2E smoke tests
        run: npx playwright test e2e/smoke.spec.ts e2e/wizard-flow.spec.ts
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-windows
          path: screenshots/
          retention-days: 7

  # ── Telegram notifications ──────────────────────────────────────────
  # Requires repo secrets: TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID
  # Add them at: Settings → Secrets and variables → Actions → New repository secret

  notify-failure:
    needs: [test-linux, test-windows]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="MarkdownV2" \
            -d text="🔴 *CI FAILED* on \`master\`%0A%0ACommit: \`${{ github.sha }}\`%0ARun: [View](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

  notify-success:
    needs: [test-linux, test-windows]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ CI passed on master (${{ github.sha }})"
