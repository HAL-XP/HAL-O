<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claudeborn — Hexagonal Honeycomb</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #030308; color: #84cc16; font-family: 'Fira Code', 'Cascadia Code', monospace; width: 100vw; height: 100vh; overflow: hidden; position: relative; }

  .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.8) 100%); pointer-events: none; z-index: 100; }

  .grid-floor { position: fixed; bottom: 0; left: -50%; width: 200%; height: 40%; background: repeating-linear-gradient(90deg, rgba(132,204,22,0.03) 0px, transparent 1px, transparent 60px), repeating-linear-gradient(0deg, rgba(132,204,22,0.03) 0px, transparent 1px, transparent 60px); transform: perspective(400px) rotateX(55deg); transform-origin: center bottom; pointer-events: none; z-index: 0; }

  /* Hex HUD corners */
  .hud-corner { position: fixed; width: 50px; height: 50px; z-index: 101; pointer-events: none; }
  .hud-corner--tl { top: 8px; left: 8px; }
  .hud-corner--tr { top: 8px; right: 8px; }
  .hud-corner--bl { bottom: 8px; left: 8px; }
  .hud-corner--br { bottom: 8px; right: 8px; }
  .hud-corner svg { width: 50px; height: 50px; }

  .edge-readout { position: fixed; font-size: 9px; color: rgba(132,204,22,0.4); z-index: 101; pointer-events: none; letter-spacing: 1px; }
  .edge-readout--left { left: 15px; top: 50%; transform: rotate(-90deg) translateX(-50%); transform-origin: left center; }
  .edge-readout--right { right: 15px; top: 50%; transform: rotate(90deg) translateX(50%); transform-origin: right center; }
  .edge-readout--bottom { bottom: 15px; left: 50%; transform: translateX(-50%); }

  .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 40px; display: flex; align-items: center; justify-content: space-between; padding: 0 70px; z-index: 50; background: linear-gradient(180deg, rgba(3,3,8,0.9) 0%, transparent 100%); border-bottom: 1px solid rgba(132,204,22,0.1); }
  .top-bar .sys-label { font-size: 13px; color: #84cc16; font-weight: 700; text-shadow: 0 0 10px rgba(132,204,22,0.5); }
  .top-bar .stats { font-size: 10px; color: rgba(132,204,22,0.6); display: flex; gap: 20px; }
  .top-bar .stats .val { color: #84cc16; font-weight: 700; }

  .svg-lines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

  /* Hex cards */
  .hex-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; }

  .hex-card { position: absolute; width: 180px; height: 200px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: rgba(132,204,22,0.04); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .hex-card:hover { background: rgba(132,204,22,0.1); }
  .hex-card-border { position: absolute; inset: 0; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: transparent; }
  .hex-card-border::before { content: ''; position: absolute; inset: 2px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: #030308; }
  .hex-card-inner { position: relative; z-index: 2; text-align: center; padding: 20px 15px; }
  .hex-card .dot { width: 6px; height: 6px; border-radius: 50%; margin: 0 auto 8px; }
  .hex-card .dot.green { background: #84cc16; box-shadow: 0 0 6px #84cc16; }
  .hex-card .dot.amber { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }
  .hex-card .card-name { font-weight: 700; font-size: 9px; color: #e2e8f0; letter-spacing: 1px; margin-bottom: 6px; word-break: break-all; }
  .hex-card .card-stack { font-size: 8px; color: rgba(132,204,22,0.5); padding: 2px 6px; border: 1px solid rgba(132,204,22,0.15); display: inline-block; }

  /* Center HAL hex */
  .hex-hal { position: absolute; width: 200px; height: 220px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; align-items: center; justify-content: center; z-index: 25; }
  .hal-sphere { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at 40% 35%, #ff6644, #ff2200 40%, #cc1100 70%, #440000 100%); box-shadow: 0 0 30px rgba(255,34,0,0.6), 0 0 60px rgba(255,34,0,0.3), 0 0 120px rgba(255,34,0,0.15), inset 0 0 30px rgba(255,100,50,0.3); animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 30px rgba(255,34,0,0.6), 0 0 60px rgba(255,34,0,0.3), 0 0 120px rgba(255,34,0,0.15), inset 0 0 30px rgba(255,100,50,0.3); } 50% { box-shadow: 0 0 40px rgba(255,34,0,0.8), 0 0 80px rgba(255,34,0,0.4), 0 0 160px rgba(255,34,0,0.2), inset 0 0 40px rgba(255,100,50,0.4); } }
</style>
</head>
<body>

<div class="vignette"></div>
<div class="grid-floor"></div>

<!-- Hex HUD Corners -->
<div class="hud-corner hud-corner--tl"><svg viewBox="0 0 50 50"><path d="M 5 25 L 15 5 L 35 5" fill="none" stroke="#84cc16" stroke-width="2"/></svg></div>
<div class="hud-corner hud-corner--tr"><svg viewBox="0 0 50 50"><path d="M 45 25 L 35 5 L 15 5" fill="none" stroke="#84cc16" stroke-width="2"/></svg></div>
<div class="hud-corner hud-corner--bl"><svg viewBox="0 0 50 50"><path d="M 5 25 L 15 45 L 35 45" fill="none" stroke="#84cc16" stroke-width="2"/></svg></div>
<div class="hud-corner hud-corner--br"><svg viewBox="0 0 50 50"><path d="M 45 25 L 35 45 L 15 45" fill="none" stroke="#84cc16" stroke-width="2"/></svg></div>

<div class="edge-readout edge-readout--left">SYS.MEM: 847MB | PROC: 23 ACTIVE | NET: 1.2GB/s</div>
<div class="edge-readout edge-readout--right">UPLINK: STABLE | LAT: 12ms | CRYPT: AES-256</div>
<div class="edge-readout edge-readout--bottom">NODE MESH: 17 CONNECTED | THROUGHPUT: 94.7% | ERR RATE: 0.003%</div>

<div class="top-bar">
  <div class="sys-label">SYS://CLAUDEBORN v1.0</div>
  <div class="stats">
    <span><span class="val">17</span> OPS</span>
    <span><span class="val">6</span> READY</span>
    <span><span class="val">11</span> PENDING</span>
  </div>
</div>

<svg class="svg-lines" id="svgLines"></svg>
<div class="hex-container" id="hexContainer"></div>

<script>
const projects = [
  { name: 'CLAUDEBORN', stack: 'React', status: 'green' },
  { name: 'SNOWFINDER', stack: 'Next.js', status: 'green' },
  { name: 'PREZSANDRINE', stack: 'FastAPI', status: 'amber' },
  { name: 'INEVITABLESTUDIO', stack: 'Next.js', status: 'green' },
  { name: 'OFFLINEGAME', stack: 'Python', status: 'amber' },
  { name: 'COMMUNITYSCANNER', stack: 'py-cli', status: 'amber' },
  { name: 'DNDMAPBUILDER', stack: 'React', status: 'amber' },
  { name: 'SCRIPT2UNREAL', stack: 'Python', status: 'amber' },
  { name: 'PIXELAGENTMONITOR', stack: 'React', status: 'green' },
  { name: 'CLAUDEPRODUCTFINDER', stack: 'Node.js', status: 'amber' },
  { name: 'CINEMASTER-DEMO', stack: 'Next.js', status: 'green' },
  { name: 'PIXEL-AGENTS', stack: 'Node.js', status: 'amber' },
  { name: 'MODELTRAINING', stack: 'Python', status: 'amber' },
  { name: 'CLAUDEDOWNLOAD', stack: 'Python', status: 'amber' },
  { name: 'CLAUDEDATAPREP', stack: 'Python', status: 'amber' },
  { name: 'CLAUDEIMAGERENDERER', stack: 'Python', status: 'green' },
  { name: 'COMFYUI', stack: 'Python', status: 'amber' }
];

const cx = window.innerWidth / 2;
const cy = window.innerHeight / 2;
const container = document.getElementById('hexContainer');
const svg = document.getElementById('svgLines');

const hexW = 180;
const hexH = 200;
const hSpacing = hexW * 0.78;
const vSpacing = hexH * 0.76;

// Hex grid positions: (col, row) in axial coordinates
// Center = HAL, then 6 neighbors, then 12 in outer ring (we need 17 project slots)
// Ring 0: center (HAL)
// Ring 1: 6 hexes
// Ring 2: pick 11 from 12 hexes
const hexPositions = [
  // Ring 0 - center (HAL)
  { q: 0, r: 0, isHal: true },
  // Ring 1
  { q: 1, r: 0 }, { q: 0, r: 1 }, { q: -1, r: 1 },
  { q: -1, r: 0 }, { q: 0, r: -1 }, { q: 1, r: -1 },
  // Ring 2
  { q: 2, r: 0 }, { q: 1, r: 1 }, { q: 0, r: 2 },
  { q: -1, r: 2 }, { q: -2, r: 1 }, { q: -2, r: 0 },
  { q: -1, r: -1 }, { q: 0, r: -2 }, { q: 1, r: -2 },
  { q: 2, r: -1 }, { q: 2, r: -1 }, // extra, we only use 17+1
];

function hexToPixel(q, r) {
  const x = hSpacing * (q + r * 0.5);
  const y = vSpacing * r;
  return { x: cx + x - hexW / 2, y: cy + y - hexH / 2 };
}

const cardPositions = [];
let projIndex = 0;

hexPositions.forEach((pos, i) => {
  if (i > 17) return;
  const { x, y } = hexToPixel(pos.q, pos.r);

  if (pos.isHal) {
    const halEl = document.createElement('div');
    halEl.className = 'hex-hal';
    halEl.style.left = (x + (hexW - 200) / 2) + 'px';
    halEl.style.top = (y + (hexH - 220) / 2) + 'px';
    halEl.innerHTML = '<div class="hal-sphere"></div>';
    container.appendChild(halEl);
    return;
  }

  if (projIndex >= projects.length) return;
  const proj = projects[projIndex++];

  const card = document.createElement('div');
  card.className = 'hex-card';
  card.style.left = x + 'px';
  card.style.top = y + 'px';
  card.innerHTML = `
    <div class="hex-card-border"><div></div></div>
    <div class="hex-card-inner">
      <div class="dot ${proj.status}"></div>
      <div class="card-name">${proj.name}</div>
      <div class="card-stack">${proj.stack}</div>
    </div>
  `;
  container.appendChild(card);

  cardPositions.push({ x: x + hexW / 2, y: y + hexH / 2 });
});

// Draw honeycomb connection lines between neighbors
hexPositions.forEach((pos, i) => {
  if (i > 17 || pos.isHal) return;
  const p = hexToPixel(pos.q, pos.r);
  const px = p.x + hexW / 2;
  const py = p.y + hexH / 2;

  // Connect to center
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', px);
  line.setAttribute('y1', py);
  line.setAttribute('x2', cx);
  line.setAttribute('y2', cy);
  line.setAttribute('stroke', 'rgba(132,204,22,0.06)');
  line.setAttribute('stroke-width', '1');
  svg.appendChild(line);
});

// Draw neighbor-to-neighbor thin lines
for (let i = 0; i < cardPositions.length; i++) {
  for (let j = i + 1; j < cardPositions.length; j++) {
    const dx = cardPositions[i].x - cardPositions[j].x;
    const dy = cardPositions[i].y - cardPositions[j].y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < hSpacing * 1.3) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', cardPositions[i].x);
      line.setAttribute('y1', cardPositions[i].y);
      line.setAttribute('x2', cardPositions[j].x);
      line.setAttribute('y2', cardPositions[j].y);
      line.setAttribute('stroke', 'rgba(132,204,22,0.04)');
      line.setAttribute('stroke-width', '1');
      svg.appendChild(line);
    }
  }
}
</script>
</body>
</html>
