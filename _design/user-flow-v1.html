<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAL-O — User Flow v1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background: linear-gradient(135deg, #050810 0%, #0a0e18 100%);
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(5, 8, 16, 0.95);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title h1 {
            font-size: 18px;
            font-weight: 700;
            color: #00e5ff;
            letter-spacing: 0.5px;
        }

        .version-badge {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(34, 197, 94, 0.2));
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #00e5ff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            color: #888;
        }

        .timestamp {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .timestamp-label {
            font-size: 10px;
            color: #666;
        }

        .timestamp-value {
            color: #00e5ff;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: #00e5ff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: rgba(0, 229, 255, 0.2);
            border-color: rgba(0, 229, 255, 0.6);
            transform: translateY(-1px);
        }

        /* Canvas container with SVG + nodes */
        .canvas-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 200px;
            overflow: hidden;
            background: linear-gradient(135deg, #050810 0%, #0a0e18 100%),
                        repeating-linear-gradient(
                            0deg,
                            rgba(0, 229, 255, 0.03) 0px,
                            rgba(0, 229, 255, 0.03) 1px,
                            transparent 1px,
                            transparent 40px
                        ),
                        repeating-linear-gradient(
                            90deg,
                            rgba(0, 229, 255, 0.03) 0px,
                            rgba(0, 229, 255, 0.03) 1px,
                            transparent 1px,
                            transparent 40px
                        );
            cursor: grab;
        }

        .canvas-container.panning {
            cursor: grabbing;
        }

        .flow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            will-change: transform;
        }

        svg.connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .nodes-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Node styling */
        .node {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border-width: 2px;
            border-style: solid;
            border-radius: 6px;
            padding: 8px;
            min-width: 140px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            user-select: none;
            pointer-events: auto;
        }

        .node:hover {
            filter: brightness(1.2);
            border-width: 3px;
        }

        .node.start, .node.end {
            border-radius: 30px;
            min-width: 150px;
        }

        .node.decision {
            width: 100px;
            height: 100px;
            padding: 0;
            border-radius: 0;
            transform: rotate(45deg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .node.decision::after {
            content: attr(data-title);
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Node type colors */
        .node.start {
            background: linear-gradient(135deg, #00e5ff, #0a8fa0);
            border-color: #00e5ff;
            color: #000;
        }

        .node.end {
            background: linear-gradient(135deg, #9f7aea, #6b5b95);
            border-color: #b0a0d0;
            color: #000;
        }

        .node.state {
            background: linear-gradient(135deg, #0a3a52, #051a33);
            border-color: #0066cc;
            color: #00e5ff;
        }

        .node.decision {
            background: linear-gradient(135deg, #fbbf24, #d97706);
            border-color: #f59e0b;
            color: #000;
        }

        .node.action {
            background: linear-gradient(135deg, #10b981, #059669);
            border-color: #22c55e;
            color: #000;
        }

        .node.system {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            border-color: #888;
            color: #e0e0e0;
        }

        /* Section labels */
        .section-label {
            position: absolute;
            color: rgba(0, 229, 255, 0.4);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            z-index: 10;
            pointer-events: none;
        }

        /* Node popup */
        .node-popup {
            position: fixed;
            background: rgba(5, 8, 16, 0.98);
            border: 1px solid rgba(0, 229, 255, 0.4);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            max-height: 500px;
            overflow-y: auto;
            z-index: 2000;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 229, 255, 0.1);
            display: none;
        }

        .node-popup.visible {
            display: block;
            animation: popupSlideIn 0.2s ease;
        }

        @keyframes popupSlideIn {
            from {
                opacity: 0;
                transform: translate(-10px, -10px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
        }

        .popup-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            padding: 4px;
            transition: color 0.2s;
        }

        .popup-close:hover {
            color: #00e5ff;
        }

        .popup-title {
            color: #00e5ff;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            margin-right: 20px;
            letter-spacing: 0.3px;
        }

        .popup-type {
            display: inline-block;
            background: rgba(0, 229, 255, 0.15);
            color: #00e5ff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: 0.2px;
        }

        .popup-story {
            color: #b0b0b0;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 14px;
            font-style: italic;
        }

        .popup-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            margin-bottom: 12px;
            color: #888;
        }

        .status-badge {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 11px;
        }

        .status-badge.inprogress {
            background: rgba(251, 146, 60, 0.2);
            color: #fb923c;
        }

        .status-badge.planned {
            background: rgba(147, 112, 219, 0.2);
            color: #a78bfa;
        }

        .popup-files {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(0, 229, 255, 0.2);
        }

        .popup-files-title {
            font-size: 11px;
            color: #666;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .popup-file {
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: #00e5ff;
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 6px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            cursor: pointer;
            transition: all 0.2s;
        }

        .popup-file:hover {
            background: rgba(0, 229, 255, 0.15);
            border-color: rgba(0, 229, 255, 0.4);
        }

        /* Legend */
        .legend {
            position: fixed;
            top: 70px;
            right: 20px;
            background: rgba(5, 8, 16, 0.95);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 8px;
            padding: 16px;
            width: 200px;
            z-index: 900;
            backdrop-filter: blur(10px);
            display: none;
        }

        .legend.visible {
            display: block;
        }

        .legend-title {
            color: #00e5ff;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.3px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 11px;
            color: #b0b0b0;
        }

        .legend-swatch {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            flex-shrink: 0;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        /* Shortcuts */
        .shortcuts {
            position: fixed;
            bottom: 210px;
            right: 20px;
            background: rgba(5, 8, 16, 0.95);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            width: 200px;
            z-index: 900;
            backdrop-filter: blur(10px);
            font-size: 10px;
            color: #888;
            line-height: 1.6;
        }

        .shortcut-line {
            margin-bottom: 6px;
        }

        .shortcut-key {
            color: #00e5ff;
            font-weight: 600;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(5, 8, 16, 0.95);
            border-top: 1px solid rgba(0, 229, 255, 0.2);
            padding: 16px 24px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            max-height: 200px;
            overflow-y: auto;
        }

        .feedback-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .feedback-input {
            width: 100%;
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: #e0e0e0;
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            resize: none;
            max-height: 120px;
            transition: all 0.2s;
        }

        .feedback-input:focus {
            outline: none;
            background: rgba(0, 229, 255, 0.1);
            border-color: rgba(0, 229, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
        }

        .feedback-input::placeholder {
            color: #555;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 229, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 229, 255, 0.4);
        }

        /* Connection lines */
        .connection-line {
            stroke: #00e5ff;
            stroke-width: 2px;
            fill: none;
            opacity: 0.8;
            stroke-dasharray: 6, 4;
            stroke-dashoffset: 0;
            animation: dashMove 20s linear infinite;
        }

        @keyframes dashMove {
            to {
                stroke-dashoffset: 10;
            }
        }

        .connection-arrow {
            fill: #00e5ff;
            opacity: 0.9;
        }

        .connection-label {
            fill: #f59e0b;
            font-size: 10px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <h1>⬤ HAL-O — User Flow</h1>
            <div class="version-badge">v2</div>
        </div>
        <div class="header-controls">
            <div class="timestamp">
                <div class="timestamp-label">Last Updated</div>
                <div class="timestamp-value" id="timestamp"></div>
            </div>
            <div class="controls">
                <button class="control-btn" id="zoomReset" title="Reset zoom (Z)">Reset Zoom</button>
                <button class="control-btn" id="legendBtn" title="Toggle legend (L)">Legend</button>
            </div>
        </div>
    </div>

    <div class="legend" id="legend">
        <div class="legend-title">Node Types</div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: linear-gradient(135deg, #00e5ff, #0a8fa0); border-color: #00e5ff;"></div>
            <span>Start / End</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: linear-gradient(135deg, #0a3a52, #051a33); border-color: #0066cc;"></div>
            <span>State / UI</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: linear-gradient(135deg, #fbbf24, #d97706); border-color: #f59e0b;"></div>
            <span>Decision</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: linear-gradient(135deg, #10b981, #059669); border-color: #22c55e;"></div>
            <span>Action</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: linear-gradient(135deg, #6b7280, #4b5563); border-color: #888;"></div>
            <span>System</span>
        </div>
    </div>

    <div class="shortcuts">
        <div class="shortcut-line"><span class="shortcut-key">Scroll:</span> Zoom</div>
        <div class="shortcut-line"><span class="shortcut-key">Drag:</span> Pan</div>
        <div class="shortcut-line"><span class="shortcut-key">Click:</span> Node details</div>
        <div class="shortcut-line"><span class="shortcut-key">Z:</span> Reset zoom</div>
        <div class="shortcut-line"><span class="shortcut-key">L:</span> Toggle legend</div>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <div class="flow-container" id="flowContainer">
            <svg class="connections" id="connectionsSvg"></svg>
            <div class="nodes-wrapper" id="nodesWrapper"></div>
        </div>
    </div>

    <div class="node-popup" id="nodePopup">
        <button class="popup-close" id="popupClose">&times;</button>
        <div class="popup-title" id="popupTitle"></div>
        <div class="popup-type" id="popupType"></div>
        <div class="popup-story" id="popupStory"></div>
        <div class="popup-status" id="popupStatus"></div>
        <div class="popup-files" id="popupFiles" style="display: none;">
            <div class="popup-files-title">Related Files</div>
            <div id="popupFilesList"></div>
        </div>
    </div>

    <div class="footer">
        <div class="feedback-label">Feedback</div>
        <textarea class="feedback-input" id="feedbackInput" placeholder="Share your thoughts on this flow diagram..."></textarea>
    </div>

            reattach: { story: 'The app automatically reattaches to the running session.', status: '✅ Implemented', files: ['src/main/terminal-manager.ts'] },

            tg_route: { story: 'The message still routes to the headless session.', status: '✅ Implemented', files: ['src/main/telegram-handler.ts'] },
            halo_closed: { story: 'I open Halo Chat while HAL-O is not running.', status: '✅ Implemented', files: ['src/renderer/public/halo-chat/'] },
            halo_fallback: { story: 'Halo Chat falls back to API mode without session awareness.', status: '✅ Implemented', files: ['src/main/http-api.ts'] },
        };

        // State
        let zoomLevel = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;

        const container = document.getElementById('canvasContainer');
        const flowContainer = document.getElementById('flowContainer');
        const svg = document.getElementById('connectionsSvg');
        const nodesWrapper = document.getElementById('nodesWrapper');

        // Render nodes
        function renderNodes() {
            nodesWrapper.innerHTML = '';
            nodes.forEach(node => {
                const div = document.createElement('div');
                div.className = `node ${node.type}`;
                div.textContent = node.title;
                div.style.left = node.x + 'px';
                div.style.top = node.y + 'px';
                div.style.width = node.width + 'px';
                div.style.height = node.height + 'px';
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showPopup(node, e.clientX, e.clientY);
                });
                nodesWrapper.appendChild(div);
            });
        }

        // Draw connections
        function drawConnections() {
            svg.innerHTML = '';
            const svgNS = 'http://www.w3.org/2000/svg';

            edges.forEach(edge => {
                const fromNode = nodes.find(n => n.id === edge.from);
                const toNode = nodes.find(n => n.id === edge.to);
                if (!fromNode || !toNode) return;

                const x1 = fromNode.x + fromNode.width / 2;
                const y1 = fromNode.y + fromNode.height / 2;
                const x2 = toNode.x + toNode.width / 2;
                const y2 = toNode.y + toNode.height / 2;

                // Line
                const line = document.createElementNS(svgNS, 'line');
                line.setAttribute('x1', x1);
                line.setAttribute('y1', y1);
                line.setAttribute('x2', x2);
                line.setAttribute('y2', y2);
                line.setAttribute('class', 'connection-line');
                svg.appendChild(line);

                // Arrowhead
                const angle = Math.atan2(y2 - y1, x2 - x1);
                const arrowSize = 8;
                const x2Adj = x2 - Math.cos(angle) * arrowSize;
                const y2Adj = y2 - Math.sin(angle) * arrowSize;

                const arrowPath = document.createElementNS(svgNS, 'path');
                const arrowPoints = `M ${x2} ${y2} L ${x2Adj - Math.sin(angle) * arrowSize / 2} ${y2Adj + Math.cos(angle) * arrowSize / 2} L ${x2Adj + Math.sin(angle) * arrowSize / 2} ${y2Adj - Math.cos(angle) * arrowSize / 2} Z`;
                arrowPath.setAttribute('d', arrowPoints);
                arrowPath.setAttribute('class', 'connection-arrow');
                svg.appendChild(arrowPath);

                // Label
                if (edge.label) {
                    const midX = (x1 + x2) / 2;
                    const midY = (y1 + y2) / 2;
                    const offset = 15;
                    const perpAngle = angle + Math.PI / 2;

                    const text = document.createElementNS(svgNS, 'text');
                    text.setAttribute('x', midX + Math.cos(perpAngle) * offset);
                    text.setAttribute('y', midY + Math.sin(perpAngle) * offset);
                    text.setAttribute('class', 'connection-label');
                    text.setAttribute('text-anchor', 'middle');
                    text.setAttribute('dominant-baseline', 'middle');
                    text.textContent = edge.label;
                    svg.appendChild(text);
                }
            });
        }

        // Update SVG size and content
        function updateView() {
            svg.setAttribute('width', container.clientWidth);
            svg.setAttribute('height', container.clientHeight);
            drawConnections();
        }

        // Pan and zoom
        function applyTransform() {
            flowContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
        }

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const oldZoom = zoomLevel;
            const zoomFactor = 0.1;
            zoomLevel = Math.max(0.3, Math.min(4, zoomLevel - e.deltaY * zoomFactor * 0.01));

            const rect = container.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const zoomDiff = zoomLevel - oldZoom;
            panX -= mouseX * zoomDiff / oldZoom;
            panY -= mouseY * zoomDiff / oldZoom;

            applyTransform();
        });

        container.addEventListener('mousedown', (e) => {
            if (e.target === container || e.target === svg) {
                isDragging = true;
                dragStartX = e.clientX - panX;
                dragStartY = e.clientY - panY;
                container.classList.add('panning');
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                panX = e.clientX - dragStartX;
                panY = e.clientY - dragStartY;
                applyTransform();
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            container.classList.remove('panning');
        });

        document.getElementById('zoomReset').addEventListener('click', () => {
            zoomLevel = 1;
            panX = 0;
            panY = 0;
            applyTransform();
        });

        // Popup
        function showPopup(node, x, y) {
            const popup = document.getElementById('nodePopup');
            const details = nodeDetails[node.id] || {};

            document.getElementById('popupTitle').textContent = node.title;
            document.getElementById('popupType').textContent = node.type.toUpperCase();
            document.getElementById('popupStory').textContent = details.story || 'No description available.';

            const statusClass = details.status?.includes('Progress') ? 'inprogress' : details.status?.includes('Planned') ? 'planned' : '';
            document.getElementById('popupStatus').innerHTML = `<span class="status-badge ${statusClass}">${details.status || 'Unknown'}</span>`;

            if (details.files && details.files.length > 0) {
                document.getElementById('popupFiles').style.display = 'block';
                const filesList = details.files.map(f => `<div class="popup-file">${f}</div>`).join('');
                document.getElementById('popupFilesList').innerHTML = filesList;
            } else {
                document.getElementById('popupFiles').style.display = 'none';
            }

            popup.classList.add('visible');
            const popupWidth = popup.offsetWidth;
            const popupHeight = popup.offsetHeight;

            let posX = x + 10;
            let posY = y + 10;

            if (posX + popupWidth > window.innerWidth - 10) {
                posX = window.innerWidth - popupWidth - 10;
            }
            if (posY + popupHeight > window.innerHeight - 210) {
                posY = window.innerHeight - popupHeight - 210;
            }

            popup.style.left = posX + 'px';
            popup.style.top = posY + 'px';
        }

        function hidePopup() {
            document.getElementById('nodePopup').classList.remove('visible');
        }

        document.getElementById('popupClose').addEventListener('click', hidePopup);
        document.getElementById('nodePopup').addEventListener('click', (e) => e.stopPropagation());

        // Legend
        document.getElementById('legendBtn').addEventListener('click', () => {
            document.getElementById('legend').classList.toggle('visible');
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'z' || e.key === 'Z') {
                zoomLevel = 1;
                panX = 0;
                panY = 0;
                applyTransform();
            }
            if (e.key === 'l' || e.key === 'L') {
                document.getElementById('legend').classList.toggle('visible');
            }
            if (e.key === 'Escape') {
                hidePopup();
            }
        });

        // Feedback storage
        const feedbackInput = document.getElementById('feedbackInput');
        feedbackInput.addEventListener('change', () => {
            localStorage.setItem('hal-o-flow-feedback', feedbackInput.value);
        });
        feedbackInput.value = localStorage.getItem('hal-o-flow-feedback') || '';

        // Initialize
        renderNodes();
        updateView();
        window.addEventListener('resize', updateView);
    </script>
