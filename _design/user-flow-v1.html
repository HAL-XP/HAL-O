<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAL-O — User Flow v1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background: linear-gradient(135deg, #050810 0%, #0a0e18 100%);
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(5, 8, 16, 0.95);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title h1 {
            font-size: 18px;
            font-weight: 700;
            color: #00e5ff;
            letter-spacing: 0.5px;
        }

        .version-badge {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(34, 197, 94, 0.2));
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #00e5ff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            color: #888;
        }

        .timestamp {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .timestamp-label {
            font-size: 10px;
            color: #666;
        }

        .timestamp-value {
            color: #00e5ff;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: #00e5ff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: rgba(0, 229, 255, 0.2);
            border-color: rgba(0, 229, 255, 0.6);
            transform: translateY(-1px);
        }

        .control-btn.active {
            background: rgba(0, 229, 255, 0.3);
            border-color: #00e5ff;
        }

        /* Canvas */
        .canvas-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #050810 0%, #0a0e18 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background:
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 229, 255, 0.03) 0px,
                    rgba(0, 229, 255, 0.03) 1px,
                    transparent 1px,
                    transparent 40px
                ),
                repeating-linear-gradient(
                    90deg,
                    rgba(0, 229, 255, 0.03) 0px,
                    rgba(0, 229, 255, 0.03) 1px,
                    transparent 1px,
                    transparent 40px
                );
        }

        /* Node Popup */
        .node-popup {
            position: fixed;
            background: rgba(5, 8, 16, 0.98);
            border: 1px solid rgba(0, 229, 255, 0.4);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            max-height: 500px;
            overflow-y: auto;
            z-index: 2000;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 229, 255, 0.1);
            display: none;
        }

        .node-popup.visible {
            display: block;
            animation: popupSlideIn 0.2s ease;
        }

        @keyframes popupSlideIn {
            from {
                opacity: 0;
                transform: translate(-10px, -10px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
        }

        .popup-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            padding: 4px;
            transition: color 0.2s;
        }

        .popup-close:hover {
            color: #00e5ff;
        }

        .popup-title {
            color: #00e5ff;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            margin-right: 20px;
            letter-spacing: 0.3px;
        }

        .popup-type {
            display: inline-block;
            background: rgba(0, 229, 255, 0.15);
            color: #00e5ff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: 0.2px;
        }

        .popup-story {
            color: #b0b0b0;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 14px;
            font-style: italic;
        }

        .popup-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            margin-bottom: 12px;
            color: #888;
        }

        .status-badge {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 11px;
        }

        .status-badge.inprogress {
            background: rgba(251, 146, 60, 0.2);
            color: #fb923c;
        }

        .status-badge.planned {
            background: rgba(147, 112, 219, 0.2);
            color: #a78bfa;
        }

        .popup-files {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(0, 229, 255, 0.2);
        }

        .popup-files-title {
            font-size: 11px;
            color: #666;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .popup-file {
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: #00e5ff;
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 6px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            cursor: pointer;
            transition: all 0.2s;
        }

        .popup-file:hover {
            background: rgba(0, 229, 255, 0.15);
            border-color: rgba(0, 229, 255, 0.4);
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(5, 8, 16, 0.95);
            border-top: 1px solid rgba(0, 229, 255, 0.2);
            padding: 16px 24px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            max-height: 200px;
            overflow-y: auto;
        }

        .feedback-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .feedback-input {
            width: 100%;
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: #e0e0e0;
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            resize: none;
            max-height: 120px;
            transition: all 0.2s;
        }

        .feedback-input:focus {
            outline: none;
            background: rgba(0, 229, 255, 0.1);
            border-color: rgba(0, 229, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
        }

        .feedback-input::placeholder {
            color: #555;
        }

        /* Legend */
        .legend {
            position: fixed;
            top: 70px;
            right: 20px;
            background: rgba(5, 8, 16, 0.95);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 8px;
            padding: 16px;
            width: 200px;
            z-index: 900;
            backdrop-filter: blur(10px);
            display: none;
        }

        .legend.visible {
            display: block;
        }

        .legend-title {
            color: #00e5ff;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.3px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 11px;
            color: #b0b0b0;
        }

        .legend-swatch {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            flex-shrink: 0;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        /* Shortcuts */
        .shortcuts {
            position: fixed;
            bottom: 210px;
            right: 20px;
            background: rgba(5, 8, 16, 0.95);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            width: 200px;
            z-index: 900;
            backdrop-filter: blur(10px);
            font-size: 10px;
            color: #888;
            line-height: 1.6;
        }

        .shortcut-line {
            margin-bottom: 6px;
        }

        .shortcut-key {
            color: #00e5ff;
            font-weight: 600;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 229, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 229, 255, 0.4);
        }
    </style>
</head>

    <script>
        // Update timestamp
        const now = new Date();
        document.getElementById('timestamp').textContent = now.toLocaleString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });

        // Canvas setup
        const canvas = document.getElementById('flowCanvas');
        const ctx = canvas.getContext('2d');
        const headerHeight = 60;
        const footerHeight = 200;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - headerHeight - footerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Zoom and pan
        let zoomLevel = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const oldZoom = zoomLevel;
            const zoomFactor = 0.1;
            zoomLevel = Math.max(0.5, Math.min(3, zoomLevel - e.deltaY * zoomFactor * 0.001));

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const zoomDiff = zoomLevel - oldZoom;
            panX -= mouseX * zoomDiff / oldZoom;
            panY -= mouseY * zoomDiff / oldZoom;

            draw();
        });

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStartX = e.clientX - panX;
            dragStartY = e.clientY - panY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                panX = e.clientX - dragStartX;
                panY = e.clientY - dragStartY;
                draw();
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        document.getElementById('zoomReset').addEventListener('click', () => {
            zoomLevel = 1;
            panX = 0;
            panY = 0;
            draw();
        });

        // Draw functions
        function getNodeColor(type) {
            switch (type) {
                case 'start':
                    return { main: '#00e5ff', dark: '#0a8fa0', border: '#00e5ff' };
                case 'state':
                    return { main: '#0a3a52', dark: '#051a33', border: '#0066cc' };
                case 'decision':
                    return { main: '#fbbf24', dark: '#d97706', border: '#f59e0b' };
                case 'action':
                    return { main: '#10b981', dark: '#059669', border: '#22c55e' };
                case 'system':
                    return { main: '#6b7280', dark: '#4b5563', border: '#888' };
                case 'end':
                    return { main: '#9f7aea', dark: '#6b5b95', border: '#b0a0d0' };
                default:
                    return { main: '#4b5563', dark: '#353d4f', border: '#666' };
            }
        }

        function drawNode(node, isHovered) {
            const x = node.x + panX;
            const y = node.y + panY;
            const w = node.width * zoomLevel;
            const h = node.height * zoomLevel;
            const fontSize = 11 * zoomLevel;
            const colors = getNodeColor(node.type);

            // Background
            ctx.fillStyle = colors.main;
            ctx.strokeStyle = colors.border;
            ctx.lineWidth = isHovered ? 3 : 2;

            if (node.type === 'start' || node.type === 'end') {
                // Rounded pill
                const radius = h / 2;
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + w - radius, y);
                ctx.arc(x + w - radius, y + h / 2, radius, -Math.PI / 2, Math.PI / 2);
                ctx.lineTo(x + radius, y + h);
                ctx.arc(x + radius, y + h / 2, radius, Math.PI / 2, -Math.PI / 2);
                ctx.fill();
                ctx.stroke();
            } else if (node.type === 'decision') {
                // Diamond
                ctx.beginPath();
                ctx.moveTo(x + w / 2, y);
                ctx.lineTo(x + w, y + h / 2);
                ctx.lineTo(x + w / 2, y + h);
                ctx.lineTo(x, y + h / 2);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            } else {
                // Rectangle with slight rounding
                const radius = 4;
                ctx.beginPath();
                ctx.roundRect(x, y, w, h, radius);
                ctx.fill();
                ctx.stroke();
            }

            // Text
            ctx.fillStyle = node.type === 'decision' ? '#000' : '#000';
            ctx.font = `bold ${fontSize}px 'JetBrains Mono'`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const lines = node.title.split('\n');
            const lineHeight = fontSize + 2;
            const totalHeight = lineHeight * lines.length;
            const startY = y + h / 2 - totalHeight / 2 + fontSize / 2;

            lines.forEach((line, i) => {
                ctx.fillText(line, x + w / 2, startY + i * lineHeight);
            });
        }

        function drawEdge(fromNode, toNode, label) {
            const x1 = fromNode.x + fromNode.width / 2 + panX;
            const y1 = fromNode.y + fromNode.height / 2 + panY;
            const x2 = toNode.x + toNode.width / 2 + panX;
            const y2 = toNode.y + toNode.height / 2 + panY;

            // Arrow line
            ctx.strokeStyle = 'rgba(0, 229, 255, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Arrowhead
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const arrowSize = 8;
            const x2Adj = x2 - Math.cos(angle) * arrowSize;
            const y2Adj = y2 - Math.sin(angle) * arrowSize;

            ctx.fillStyle = 'rgba(0, 229, 255, 0.6)';
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2Adj - Math.sin(angle) * arrowSize / 2, y2Adj + Math.cos(angle) * arrowSize / 2);
            ctx.lineTo(x2Adj + Math.sin(angle) * arrowSize / 2, y2Adj - Math.cos(angle) * arrowSize / 2);
            ctx.closePath();
            ctx.fill();

            // Edge label
            if (label) {
                const midX = (x1 + x2) / 2;
                const midY = (y1 + y2) / 2;
                const offset = 15;
                const perpAngle = angle + Math.PI / 2;

                ctx.fillStyle = '#f59e0b';
                ctx.font = `bold 10px 'JetBrains Mono'`;
                ctx.textAlign = 'center';
                ctx.fillText(label, midX + Math.cos(perpAngle) * offset, midY + Math.sin(perpAngle) * offset);
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(5, 8, 16, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw edges first (behind nodes)
            edges.forEach(edge => {
                const fromNode = nodes.find(n => n.id === edge.from);
                const toNode = nodes.find(n => n.id === edge.to);
                if (fromNode && toNode) {
                    drawEdge(fromNode, toNode, edge.label);
                }
            });

            // Draw nodes
            nodes.forEach(node => {
                const mouseX = lastMouseX - panX;
                const mouseY = lastMouseY - panY - headerHeight;
                const isHovered = mouseX >= node.x && mouseX <= node.x + node.width &&
                                  mouseY >= node.y && mouseY <= node.y + node.height;
                drawNode(node, isHovered);
            });
        }

        let lastMouseX = 0;
        let lastMouseY = 0;

        canvas.addEventListener('mousemove', (e) => {
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            if (!isDragging) draw();
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left - panX;
            const mouseY = e.clientY - rect.top - panY;

            const clicked = nodes.find(node =>
                mouseX >= node.x && mouseX <= node.x + node.width &&
                mouseY >= node.y && mouseY <= node.y + node.height
            );

            if (clicked) {
                showPopup(clicked, e.clientX, e.clientY);
            } else {
                hidePopup();
            }
        });

        function showPopup(node, x, y) {
            const popup = document.getElementById('nodePopup');
            const details = nodeDetails[node.id] || {};

            document.getElementById('popupTitle').textContent = node.title;
            document.getElementById('popupType').textContent = node.type.toUpperCase();
            document.getElementById('popupStory').textContent = details.story || 'No description available.';

            const statusHtml = `<span class="status-badge ${details.status?.includes('Progress') ? 'inprogress' : details.status?.includes('Planned') ? 'planned' : ''}">${details.status || 'Unknown'}</span>`;
            document.getElementById('popupStatus').innerHTML = statusHtml;

            if (details.files && details.files.length > 0) {
                document.getElementById('popupFiles').style.display = 'block';
                const filesList = details.files.map(f => `<div class="popup-file">${f}</div>`).join('');
                document.getElementById('popupFilesList').innerHTML = filesList;
            } else {
                document.getElementById('popupFiles').style.display = 'none';
            }

            popup.classList.add('visible');
            const popupWidth = popup.offsetWidth;
            const popupHeight = popup.offsetHeight;

            let posX = x + 10;
            let posY = y + 10;

            if (posX + popupWidth > window.innerWidth - 10) {
                posX = window.innerWidth - popupWidth - 10;
            }
            if (posY + popupHeight > window.innerHeight - 210) {
                posY = window.innerHeight - popupHeight - 210;
            }

            popup.style.left = posX + 'px';
            popup.style.top = posY + 'px';
        }

        function hidePopup() {
            document.getElementById('nodePopup').classList.remove('visible');
        }

        document.getElementById('popupClose').addEventListener('click', hidePopup);
        document.getElementById('nodePopup').addEventListener('click', (e) => e.stopPropagation());

        // Legend toggle
        document.getElementById('legendBtn').addEventListener('click', () => {
            document.getElementById('legend').classList.toggle('visible');
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'z' || e.key === 'Z') {
                zoomLevel = 1;
                panX = 0;
                panY = 0;
                draw();
            }
            if (e.key === 'l' || e.key === 'L') {
                document.getElementById('legend').classList.toggle('visible');
            }
            if (e.key === 'Escape') {
                hidePopup();
            }
        });

        // Feedback storage
        const feedbackInput = document.getElementById('feedbackInput');
        feedbackInput.addEventListener('change', () => {
            localStorage.setItem('hal-o-flow-feedback', feedbackInput.value);
        });

        feedbackInput.value = localStorage.getItem('hal-o-flow-feedback') || '';

        // Initial draw
        draw();

        // Polyfill for roundRect if not available
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.beginPath();
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
            };
        }
